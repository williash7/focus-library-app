<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="icon" href="icons/icon-192.png" type="image/png" sizes="192x192">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#5c3d2e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ספריית הפוקוס">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png">
  <title>📚 ספריית הפוקוס</title>
<style>*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #fdf8f0;
  --bg2: #f5ede0;
  --card: #ffffff;
  --primary: #5c3d2e;
  --accent: #d4a843;
  --text: #2c1810;
  --muted: #8b6f5a;
  --border: #e8d5c0;
  --shadow: 0 2px 12px rgba(92,61,46,0.12);
  --radius: 12px;
}
[data-theme="sepia"] {
  --bg: #f4ecd8; --bg2: #ecdfc4; --card: #fdf6e3;
  --text: #3d2b1f; --muted: #7a6347; --border: #d9c9a8;
}
[data-theme="dark"] {
  --bg: #1a1612; --bg2: #231e19; --card: #2d2520;
  --text: #e8d5c0; --muted: #8b7363; --border: #3d3028; --primary: #c8956a; --accent: #d4a843;
}

html, body { height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, Arial, sans-serif; direction: rtl; background: var(--bg); color: var(--text); }

/* ── LIBRARY PAGE ── */
#libPage { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

.lib-header { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 20px; flex-shrink: 0; }
.lib-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.lib-title-row h1 { font-size: 1.3rem; color: var(--primary); font-weight: 700; }

.lib-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
.tab-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
.tab-btn.active, .tab-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }

.lib-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.search-input { flex: 1; min-width: 140px; padding: 7px 12px; border: 1px solid var(--border); border-radius: 20px; background: var(--bg); color: var(--text); font-size: 0.9rem; outline: none; }
.search-input:focus { border-color: var(--accent); }
.sort-select { padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 0.85rem; cursor: pointer; }
.view-btn { width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 1rem; }
.view-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

#libContent { flex: 1; overflow-y: auto; padding: 16px; }

/* ── BOOK CARDS ── */
.book-list { display: flex; flex-direction: column; gap: 10px; }
.book-card-list { display: flex; align-items: center; gap: 14px; background: var(--card); border-radius: var(--radius); padding: 12px; box-shadow: var(--shadow); cursor: pointer; transition: transform 0.15s; }
.book-card-list:hover { transform: translateX(-2px); }
.book-info { flex: 1; min-width: 0; }
.book-title { font-weight: 600; font-size: 0.95rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.book-meta { font-size: 0.78rem; color: var(--muted); margin: 2px 0; }
.tags-row { display: flex; gap: 4px; flex-wrap: wrap; margin: 4px 0; }
.tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; background: var(--bg2); color: var(--primary); }
.progress-bar-wrap { height: 4px; background: var(--bg2); border-radius: 2px; margin: 6px 0 2px; }
.progress-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
.progress-label { font-size: 0.72rem; color: var(--muted); }
.book-actions { display: flex; flex-direction: column; gap: 4px; }

.book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }
.book-card-grid { background: var(--card); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); cursor: pointer; transition: transform 0.15s; }
.book-card-grid:hover { transform: translateY(-3px); }
.cover-wrap { position: relative; }
.cover-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; gap: 10px; border-radius: var(--radius) var(--radius) 0 0; }
.cover-wrap:hover .cover-overlay { display: flex; }
.overlay-btn { background: white; border: none; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; font-size: 1rem; }
.grid-book-info { padding: 10px; }

/* ── COVERS ── */
.cover-xs { width: 40px; height: 56px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
.cover-sm { width: 56px; height: 78px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
.cover-md { width: 90px; height: 126px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
.cover-lg { width: 100%; height: 200px; object-fit: cover; display: block; }
.cover-placeholder { display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem; font-weight: bold; background: #5c3d2e; }
.cover-xs.cover-placeholder { font-size: 1rem; }
.cover-lg.cover-placeholder { font-size: 3rem; height: 200px; }

/* ── SHELVES / SERIES ── */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 24px; font-size: 0.9rem; z-index: 9999; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
.toast.show { opacity: 1; }
.book-picker-item { display: flex; align-items: center; gap: 10px; padding: 8px 4px; border-bottom: 1px solid var(--border); cursor: pointer; }
.book-picker-item:hover { background: var(--bg2); border-radius: 6px; }
.book-picker-item input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--primary); flex-shrink: 0; }
.book-picker-item .cover-xs { width: 32px; height: 44px; object-fit: cover; border-radius: 3px; flex-shrink: 0; }
.book-picker-item .picker-title { font-size: 0.9rem; color: var(--text); }
.section-actions { display: flex; gap: 8px; margin-bottom: 16px; }
.shelf-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
.shelf-card { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
.shelf-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.shelf-name { font-weight: 600; color: var(--text); font-size: 1rem; }
.shelf-covers { display: flex; gap: 6px; margin-bottom: 8px; align-items: flex-end; flex-wrap: wrap; }
.shelf-meta { font-size: 0.78rem; color: var(--muted); margin-bottom: 8px; }

/* ── DICT (library tab) ── */
.dict-header { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.dict-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
.dict-card { background: var(--card); border-radius: 10px; padding: 12px 12px 12px 16px; box-shadow: var(--shadow); position: relative; }
.dict-term { font-weight: 700; font-size: 1rem; color: var(--text); margin-bottom: 3px; }
.dict-cat { font-size: 0.75rem; color: var(--muted); margin-bottom: 6px; }
.dict-def { font-size: 0.85rem; color: var(--text); line-height: 1.5; }
.dict-card .icon-btn { position: absolute; top: 8px; left: 8px; }

/* ── BUTTONS ── */
.btn-primary { padding: 8px 18px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: opacity 0.2s; }
.btn-primary:hover { opacity: 0.85; }
.btn-secondary { padding: 7px 14px; background: var(--bg2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
.btn-secondary:hover { border-color: var(--primary); color: var(--primary); }
.btn-text { background: none; border: none; color: var(--primary); cursor: pointer; font-size: 0.85rem; padding: 4px 0; text-decoration: underline; }
.icon-btn { background: none; border: none; cursor: pointer; font-size: 1.1rem; padding: 4px 6px; border-radius: 6px; transition: background 0.15s; }
.icon-btn:hover { background: var(--bg2); }
.fab { padding: 8px 16px; background: var(--accent); color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: 700; font-size: 0.9rem; box-shadow: 0 2px 8px rgba(212,168,67,0.4); transition: transform 0.15s; }
.fab:hover { transform: scale(1.05); }

/* ── NAV DRAWER ── */
.nav-drawer { position:fixed; top:0; right:-310px; width:290px; height:100vh; background:var(--card); box-shadow:-3px 0 24px rgba(0,0,0,0.18); z-index:500; transition:right 0.25s ease; display:flex; flex-direction:column; }
.nav-drawer.open { right:0; }
.nav-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:499; opacity:0; pointer-events:none; transition:opacity 0.25s; }
.nav-overlay.open { opacity:1; pointer-events:all; }
.nav-drawer-header { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.nav-drawer-title { font-weight:700; font-size:1rem; color:var(--primary); }
.nav-links { flex:1; overflow-y:auto; padding:8px 0; }
.nav-item { display:flex; align-items:center; gap:10px; width:100%; padding:11px 16px; background:none; border:none; color:var(--text); font-size:0.95rem; cursor:pointer; text-align:right; transition:background 0.15s; }
.nav-item:hover { background:var(--bg2); }
.nav-item.active { background:var(--bg2); color:var(--primary); font-weight:700; border-right:3px solid var(--primary); }
.nav-divider { height:1px; background:var(--border); margin:8px 16px; }
.nav-drawer-footer { padding:12px 16px; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:6px; flex-shrink:0; }
.nav-theme-row { display:flex; gap:6px; }
.nav-theme-btn { flex:1; padding:5px 0; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; font-size:0.8rem; transition:all 0.15s; }
.nav-theme-btn.active { background:var(--primary); color:white; border-color:var(--primary); }
.nav-danger { color:#e74c3c !important; }

/* ── MINIMAL HEADER ── */
.lib-header-min { background:var(--card); border-bottom:1px solid var(--border); padding:10px 14px; display:flex; align-items:center; gap:8px; flex-shrink:0; }
.lib-tab-title { flex:1; font-size:1.05rem; font-weight:700; color:var(--primary); }
.lib-controls-bar { padding:8px 14px; background:var(--card); border-bottom:1px solid var(--border); display:flex; gap:6px; align-items:center; flex-wrap:wrap; flex-shrink:0; }

/* ── GROUP VIEW ── */
.group-section { margin-bottom:20px; }
.group-header { display:flex; align-items:center; justify-content:space-between; padding:6px 0 5px; border-bottom:2px solid var(--accent); margin-bottom:10px; }
.group-name { font-weight:700; font-size:0.95rem; color:var(--primary); }
.group-count { font-size:0.75rem; color:var(--muted); background:var(--bg2); padding:1px 8px; border-radius:10px; }

/* ── FIELD CHIPS (multi-value) ── */
.fchips { display:flex; gap:3px; flex-wrap:wrap; margin:2px 0; }
.fchip { font-size:0.7rem; padding:1px 8px; border-radius:9px; white-space:nowrap; }
.fchip-author { background:#f0e8e0; color:#5c3d2e; }
.fchip-pub    { background:#dce8f0; color:#1d3557; }
.fchip-genre  { background:#dceee6; color:#2d6a4f; }
[data-theme="dark"] .fchip-author { background:#3d2820; color:#c8956a; }
[data-theme="dark"] .fchip-pub    { background:#1a2535; color:#5d9ac7; }
[data-theme="dark"] .fchip-genre  { background:#1a2e26; color:#5db88a; }

/* ── BULK SELECT ── */
.book-card-list.book-card-selected, .book-card-grid.book-card-selected { outline: 2px solid var(--accent); background: color-mix(in srgb, var(--accent) 8%, var(--card)); }
.book-select-cb { width: 18px; height: 18px; accent-color: var(--accent); flex-shrink: 0; cursor: pointer; }
.select-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--border); border-radius: 28px; box-shadow: 0 4px 20px rgba(0,0,0,0.18); padding: 10px 18px; display: flex; align-items: center; gap: 10px; z-index: 200; white-space: nowrap; }
.select-bar-count { font-size: 0.9rem; color: var(--text); font-weight: 600; }
.btn-danger { padding: 7px 16px; background: #e74c3c; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: opacity 0.2s; }
.btn-danger:hover { opacity: 0.85; }
.btn-danger:disabled { opacity: 0.4; cursor: default; }

/* ── INFO PANEL ── */
.info-panel { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 14px; }
.info-panel-stats { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.info-stat-total { font-size: 0.9rem; color: var(--text); white-space: nowrap; }
.info-stat-sep { color: var(--border); font-size: 1rem; }
.info-panel-breakdown { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.info-chip { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 14px; border: 1px solid var(--border); background: var(--bg2); color: var(--muted); cursor: pointer; font-size: 0.8rem; transition: all 0.15s; white-space: nowrap; }
.info-chip:hover { border-color: var(--primary); color: var(--primary); }
.info-chip-active { background: var(--chip-color, var(--primary)); color: white !important; border-color: var(--chip-color, var(--primary)) !important; }
.info-chip-count { font-weight: 700; font-size: 0.75rem; }

/* ── READING STATS ── */
.stats-panel { padding: 2px 0; }
.stat-card { background: var(--bg2); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
.stat-icon { font-size: 1.3rem; flex-shrink: 0; }
.stat-info { flex: 1; min-width: 0; }
.stat-value { font-size: 1.15rem; font-weight: 700; color: var(--primary); line-height: 1.2; }
.stat-label { font-size: 0.72rem; color: var(--muted); }
.stats-row { display: flex; gap: 6px; }
.stats-row .stat-card { flex: 1; margin-bottom: 0; }
.stat-chart-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin: 8px 0; }
.stat-chart-title { font-size: 0.78rem; color: var(--muted); margin-bottom: 8px; font-weight: 600; }
.chart-bars { display: flex; align-items: flex-end; gap: 2px; height: 60px; }
.chart-bar-wrap { display: flex; flex-direction: column; align-items: center; flex: 1; height: 100%; justify-content: flex-end; }
.chart-bar { width: 100%; background: var(--accent); border-radius: 2px 2px 0 0; min-height: 1px; }
.chart-bar-label { font-size: 0.55rem; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; text-align: center; }
.lib-stats-summary { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.lib-stat-chip { flex: 1; min-width: 90px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 8px; text-align: center; box-shadow: var(--shadow); }
.lib-stat-chip .stat-value { font-size: 1rem; }
.lib-stats-table { background: var(--card); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
.lib-stats-row { display: flex; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--border); gap: 10px; }
.lib-stats-row:last-child { border-bottom: none; }
.lib-stats-book { flex: 1; min-width: 0; }
.lib-stats-book-title { font-weight: 600; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
.lib-stats-nums { display: flex; gap: 14px; flex-shrink: 0; }
.lib-stats-num { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.lib-stats-num .num-val { font-size: 0.9rem; font-weight: 700; color: var(--primary); }
.lib-stats-num .num-lbl { font-size: 0.65rem; color: var(--muted); }
.nav-section-label { font-size: 0.7rem; color: var(--muted); padding: 6px 4px 2px; font-weight: 700; letter-spacing: 0.05em; }
.export-btns-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.export-btn { display: flex; align-items: center; gap: 6px; padding: 7px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer; font-size: 0.82rem; white-space: nowrap; transition: all 0.15s; }
.export-btn:hover { background: var(--bg2); border-color: var(--primary); color: var(--primary); }

/* ── EMPTY STATE ── */
.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-state p { margin: 10px 0; font-size: 1rem; }
.empty-state .btn-primary { margin-top: 16px; }
.muted { color: var(--muted); font-size: 0.85rem; }

/* ── READER PAGE ── */
#readerPage { position: fixed; inset: 0; display: none; flex-direction: column; background: var(--bg); z-index: 100; }

.reader-header { background: var(--card); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.back-btn { background: none; border: 1px solid var(--border); padding: 6px 12px; border-radius: 8px; cursor: pointer; color: var(--primary); font-size: 0.85rem; white-space: nowrap; }
.reader-title { flex: 1; font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
.reader-header-right { display: flex; align-items: center; gap: 8px; }
.page-indicator { font-size: 0.8rem; color: var(--muted); white-space: nowrap; }

.reader-body { display: flex; flex: 1; overflow: hidden; }
.reader-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

#readerMain { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 16px; display: flex; justify-content: center; align-items: flex-start; }
.loading-msg { font-size: 1.1rem; color: var(--muted); padding: 40px; }
#pdfContainer { width: 100%; }
#pdfPagesContainer { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 8px 0; width: 100%; }
.pdf-page-wrap { position: relative; box-shadow: var(--shadow); background: #fff; border-radius: 4px; overflow: hidden; flex-shrink: 0; }
.pdf-page-wrap canvas { display: block; }
.pdf-page-placeholder { display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 0.8rem; background: var(--bg2); width: 100%; height: 100%; position: absolute; inset: 0; }
.pdf-text-layer { position: absolute; top: 0; left: 0; overflow: hidden; line-height: 1; user-select: text; pointer-events: none; }
.pdf-text-layer span { color: transparent; position: absolute; white-space: pre; cursor: text; transform-origin: 0% 0%; pointer-events: all; }
.pdf-text-layer span::selection { background: rgba(0, 100, 255, 0.25); }

.epub-content { max-width: 680px; width: 100%; line-height: 1.8; font-size: 16px; color: var(--text); text-align: justify; word-break: break-word; overflow-wrap: break-word; hyphens: auto; -webkit-hyphens: auto; overflow-x: hidden; }
.epub-content h1, .epub-content h2, .epub-content h3 { margin: 1em 0 0.5em; color: var(--primary); text-align: start; }
.epub-content p { margin-bottom: 0.8em; text-align: justify; }
.epub-content li { text-align: justify; }
.epub-content img { max-width: 100% !important; height: auto !important; border-radius: 4px; display: block; }
.epub-content a { color: var(--accent); }
.epub-content table { width: 100% !important; max-width: 100% !important; table-layout: fixed; word-break: break-word; }
.epub-content pre, .epub-content code { white-space: pre-wrap; word-break: break-all; font-size: 0.88em; }
.epub-content * { max-width: 100%; box-sizing: border-box; }

.reader-nav { display: none; align-items: center; justify-content: space-between; padding: 10px 16px; background: var(--card); border-top: 1px solid var(--border); flex-shrink: 0; }
.nav-btn { padding: 7px 18px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
.nav-btn:disabled { opacity: 0.4; cursor: default; }
.page-display { font-size: 0.9rem; color: var(--muted); }

/* ── SIDEBAR ── */
.reader-sidebar { width: 280px; border-right: 1px solid var(--border); background: var(--card); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; transition: width 0.22s ease; }
.reader-sidebar.sidebar-hidden { width: 0; border-right: none; overflow: hidden; }
.sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); }
.stab { flex: 1; padding: 10px 4px; background: none; border: none; cursor: pointer; font-size: 1.2rem; color: var(--muted); border-bottom: 3px solid transparent; transition: all 0.2s; }
.stab.active { color: var(--primary); border-bottom-color: var(--primary); background: var(--bg); }
#sidebarContent { flex: 1; overflow-y: auto; padding: 14px; }

/* ── TIMER PANEL ── */
.timer-panel { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 8px 0; }
.timer-ring { filter: drop-shadow(0 2px 6px rgba(212,168,67,0.3)); }
.timer-controls { display: flex; gap: 8px; }

<script>// ═══ STATE ═══
const S = {
  books: [], shelves: [], seriesList: [],
  annotations: [], dictionary: [], bookmarks: [],
  libTab: 'books', libView: 'list', libSort: 'date', libSearch: '',
  libTypeFilter: null, libFormatFilter: null, libLangFilter: null,
  libShelfFilter: null, libSeriesFilter: null, libInfoFilter: null,
  libGroupBy: null, libInfoBreakdownOpen: false,
  libSelectMode: false, libSelected: new Set(),
  currentBook: null, pdfDoc: null, currentPage: 1, totalPages: 0,
  epubChapters: [], epubChapterIdx: 0, epubZip: null, epubDir: '', epubImages: {},
  pdfOutline: [], _outlineFlat: [], _pdfObserver: null, _pdfSaveTimer: null,
  _editingTocId: null, _addingToc: false,
  readerPanel: 'timer',
  timerRunning: false, timerMin: 25, timerSec: 0, timerInterval: null, pomodorosDone: 0,
  _sessionStart: null, _sessionPomodoros: 0, _sessionInterruptions: 0, bookSessions: [],
  theme: 'light', fontSize: 16, sidebarOpen: false,
  pendingSelText: '',
  db: null,
};

// ═══ DATABASE ═══
// פותח את מסד הנתונים של IndexedDB ומגדיר את מבנה האחסון
function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open('FocusLibrary', 6);
    r.onupgradeneeded = e => {
      const d = e.target.result;
      const tx = e.target.transaction;
      if (!d.objectStoreNames.contains('books'))
        d.createObjectStore('books', { keyPath: 'id' });
      if (!d.objectStoreNames.contains('annotations')) {
        const a = d.createObjectStore('annotations', { keyPath: 'id' });
        a.createIndex('bookId', 'bookId');
      }
      if (!d.objectStoreNames.contains('dictionary')) {
        const x = d.createObjectStore('dictionary', { keyPath: 'id' });
        x.createIndex('bookId', 'bookId');
      }
      if (!d.objectStoreNames.contains('shelves'))
        d.createObjectStore('shelves', { keyPath: 'id' });
      if (!d.objectStoreNames.contains('series'))
        d.createObjectStore('series', { keyPath: 'id' });
      if (!d.objectStoreNames.contains('bookmarks')) {
        const bm = d.createObjectStore('bookmarks', { keyPath: 'id' });
        bm.createIndex('bookId', 'bookId');
      }
      // v5: separate file blobs from book metadata so startup doesn't load all binary data
      if (!d.objectStoreNames.contains('files'))
        d.createObjectStore('files', { keyPath: 'id' });
      // v6: reading sessions for statistics
      if (!d.objectStoreNames.contains('readingSessions')) {
        const rs = d.createObjectStore('readingSessions', { keyPath: 'id' });
        rs.createIndex('bookId', 'bookId');
      }
      // migrate existing books: move fileData into the files store
      if (e.oldVersion < 5 && d.objectStoreNames.contains('books')) {
        const booksStore = tx.objectStore('books');
        const filesStore = tx.objectStore('files');
        booksStore.openCursor().onsuccess = function(ev) {
          const cursor = ev.target.result;
          if (!cursor) return;
          const book = cursor.value;
          if (book.fileData) {
            filesStore.put({ id: book.id, data: book.fileData });
            delete book.fileData;
            cursor.update(book);
          }
          cursor.continue();
        };
      }
    };
    r.onsuccess = e => { S.db = e.target.result; res(); };
    r.onerror = rej;
  });
}
// מחזיר אובייקט-חנות של IndexedDB לפי שם ומצב (קריאה/כתיבה)
function dbTx(store, mode) {
  return S.db.transaction(store, mode || 'readonly').objectStore(store);
}
// מחזיר את כל הרשומות מחנות נתונים נתונה
function dbGetAll(store) {
  return new Promise((res, rej) => {
    const r = dbTx(store).getAll();
    r.onsuccess = () => res(r.result);
    r.onerror = rej;
  });
}
// מחזיר רשומה בודדת לפי מזהה מחנות נתונים
function dbGet(store, id) {
  return new Promise((res, rej) => {
    const r = dbTx(store).get(id);
    r.onsuccess = () => res(r.result);
    r.onerror = rej;
  });
}
// שומר או מעדכן רשומה בחנות נתונים
function dbPut(store, obj) {
  return new Promise((res, rej) => {
    const r = dbTx(store, 'readwrite').put(obj);
    r.onsuccess = () => res(r.result);
    r.onerror = rej;
  });
}
// Returns book metadata without the binary file content (safe to store in books store)
function bookMeta(b) {
  const { fileData, _fileData, ...meta } = b;
  return meta;
}
// מוחק רשומה לפי מזהה מחנות נתונים
function dbDelete(store, id) {
  return new Promise((res, rej) => {
    const r = dbTx(store, 'readwrite').delete(id);
    r.onsuccess = () => res();
    r.onerror = rej;
  });
}
// מחזיר רשומות מחנות נתונים לפי ערך אינדקס
function dbGetByIndex(store, idx, val) {
  return new Promise((res, rej) => {
    const r = dbTx(store).index(idx).getAll(val);
    r.onsuccess = () => res(r.result);
    r.onerror = rej;
  });
}

// ═══ UTILITIES ═══
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const esc = s => (s || '').toString()

// ═══ INIT ═══
// מאתחל את האפליקציה, פותח את מסד הנתונים ומציג את הספרייה
async function init() {
  const libPage = document.getElementById('libPage');
  if (libPage) libPage.innerHTML = '<div style="text-align:center;padding:60px 20px;font-family:Arial,sans-serif;color:#5c3d2e"><div style="font-size:3rem">📚</div><p style="margin-top:12px">טוען ספרייה...</p></div>';
  try {
    await openDB();
    S.books = await dbGetAll('books');
    S.shelves = await dbGetAll('shelves');
    S.seriesList = await dbGetAll('series');
    S.theme = localStorage.getItem('theme') || 'light';
    S.fontSize = parseInt(localStorage.getItem('fontSize') || '16');
    S.sidebarOpen = localStorage.getItem('sidebarOpen') === 'true';
    applyTheme();
    renderLib();
  } catch(e) {
    console.error('Init failed:', e);
    if (libPage) libPage.innerHTML = '<div style="text-align:center;padding:60px 20px;font-family:Arial,sans-serif;color:#c0392b"><div style="font-size:3rem">⚠️</div><p style="margin:12px 0;font-size:1.1rem">שגיאה בטעינת האפליקציה</p><p style="color:#666;font-size:0.9rem">' + e.message + '</p><button onclick="location.reload()" style="margin-top:16px;padding:10px 20px;background:#5c3d2e;color:white;border:none;border-radius:8px;cursor:pointer">נסה שוב</button></div>';
  }
}

function cycleTheme() {

function closeFilterPanel() {
  const el = $id('fpOverlay');
  if (!el) return;
  el.classList.remove('open');
  el.addEventListener('transitionend', () => el.remove(), { once: true });
}

function _refreshFpState() {
  const chips = $id('fpTypeChips');
  if (chips) chips.querySelectorAll('.fp-chip').forEach((btn, i) => {
    btn.classList.toggle('active', (S.libTypeFilter ?? null) === ITEM_TYPES[i].v);
  });
  const btn = document.querySelector('.filter-btn');
  if (!btn) return;
  const n = [S.libTypeFilter, S.libFormatFilter, S.libLangFilter, S.libGroupBy].filter(Boolean).length;
  btn.classList.toggle('has-filters', n > 0);
  let badge = btn.querySelector('.filter-count-badge');
  if (n && !badge) { badge = document.createElement('span'); badge.className='filter-count-badge'; btn.appendChild(badge); }
  if (badge) { if (n) badge.textContent = n; else badge.remove(); }
}

}

// ═══ GROUP VIEW ═══
// מרנדר ספרים מקובצים לפי שדה הקיבוץ הנוכחי
function renderGroupedBooks(books) {
  const gf = S.libGroupBy;
  const groups = new Map();
  for (const book of books) {
    let keys = [];
    if (gf === 'author')          keys = splitField(book.author);
    else if (gf === 'year')       keys = [(book.year||'').trim()];
    else if (gf === 'genre')      keys = splitField(book.genre);
    else if (gf === 'publisher')  keys = splitField(book.publisher);
    else if (gf === 'language')   keys = [(book.language||'').trim()];
    else if (gf === 'type')       keys = [ITEM_TYPE_LABEL[book.itemType||'book'] || 'ספר'];
    else if (gf === 'firstLetter') {
      const ch = (book.title||'').replace(/^["״«\s]+/,'').charAt(0).toUpperCase();
      keys = [ch || '#'];
    }
    if (!keys.length || (keys.length===1 && !keys[0])) keys = ['ללא'];
    for (const k of keys) { if (!groups.has(k)) groups.set(k,[]); groups.get(k).push(book); }
  }
  let sorted = [...groups.entries()];
  if (gf === 'year') sorted.sort((a,b) => (b[0]||'0').localeCompare(a[0]||'0'));
  else if (gf === 'firstLetter') sorted.sort((a,b) => a[0].localeCompare(b[0],'he'));
  else sorted.sort((a,b) => { if (a[0]==='ללא') return 1; if (b[0]==='ללא') return -1; return a[0].localeCompare(b[0],'he'); });
  if (!sorted.length) return `<div class="empty-state"><div style="font-size:3rem">🔍</div><p>אין ספרים</p></div>`;
  return sorted.map(([name, gbooks]) => `
    <div class="group-section">
      <div class="group-header">
        <span class="group-name">${esc(name)}</span>
        <span class="group-count">${gbooks.length} ספרים</span>
      </div>
      <div class="${S.libView==='grid'?'book-grid':'book-list'}">${gbooks.map(S.libView==='grid'?bookGridCard:bookListCard).join('')}</div>
    </div>`).join('');
}

// מחזיר רשימת שמות שדות חסרים בספר נתון
function missingFields(b) {
  const missing = [];
  if (!b.author?.trim())    missing.push('מחבר');
  if (!b.coverUrl?.trim())  missing.push('כריכה');
  if (!b.publisher?.trim()) missing.push('הוצאה');
  if (!b.year?.toString().trim()) missing.push('שנה');
  if (!b.genre?.trim())     missing.push('ז׳אנר');
  return missing;
}

// מחזיר את רשימת הספרים לאחר סינון ומיון לפי הגדרות המשתמש
function getSortedBooks() {
  let books = [...S.books];
  if (S.libSearch) {
    const q = S.libSearch.toLowerCase();
    books = books.filter(b =>
      (b.title||'').toLowerCase().includes(q) || (b.author||'').toLowerCase().includes(q)
    );
  }
  if (S.libTypeFilter)   books = books.filter(b => (b.itemType||'book') === S.libTypeFilter);
  if (S.libFormatFilter) books = books.filter(b => (b.format||'') === S.libFormatFilter);
  if (S.libLangFilter)   books = books.filter(b => (b.language||'') === S.libLangFilter);
  if (S.libShelfFilter)  books = books.filter(b => (b.shelves||[]).includes(S.libShelfFilter));
  if (S.libSeriesFilter) books = books.filter(b => (b.series||[]).includes(S.libSeriesFilter));
  if (S.libInfoFilter === 'missing') books = books.filter(b => missingFields(b).length > 0);
  if (S.libInfoFilter === 'complete') books = books.filter(b => missingFields(b).length === 0);
  if (S.libInfoFilter?.startsWith('missing:')) {
    const field = S.libInfoFilter.slice(8);
    books = books.filter(b => missingFields(b).includes(field));
  }
  // מיון לפי סדרה כשמסנן לפי סדרה
  if (S.libSeriesFilter && S.libSort === 'date') {
    books.sort((a,b) => ((a.seriesNums||{})[S.libSeriesFilter]??9999) - ((b.seriesNums||{})[S.libSeriesFilter]??9999));
    return books;
  }
  // מיון חכם לפי סוג פריט כשמיון ברירת מחדל
  const effectiveSort = S.libSort !== 'date' ? S.libSort :
    S.libTypeFilter === 'journal'  ? 'issueDate' :
    S.libTypeFilter === 'article'  ? 'author' :
    'date';
  books.sort((a,b) => {
    if (effectiveSort==='title')     return (a.title||'').localeCompare(b.title||'','he');
    if (effectiveSort==='author')    return (a.author||'').localeCompare(b.author||'','he');
    if (effectiveSort==='year')      return (b.year||0) - (a.year||0);
    if (effectiveSort==='publisher') return (a.publisher||b.organization||'').localeCompare(b.publisher||b.organization||'','he');
    if (effectiveSort==='format')    return (a.format||'').localeCompare(b.format||'');
    if (effectiveSort==='progress')  return getProgress(b) - getProgress(a);
    if (effectiveSort==='issueDate') return (b.issueDate||'').localeCompare(a.issueDate||'');
    if (effectiveSort==='volume') {
      const vd = (b.volume||0) - (a.volume||0);
      return vd !== 0 ? vd : (b.issue||'').localeCompare(a.issue||'');
    }
    return (b.dateAdded||0) - (a.dateAdded||0);
  });
  return books;
}

// מחזיר את אחוז ההתקדמות בקריאת ספר
function getProgress(book) {
  if (!book.totalPages) return 0;
  if (book.format === 'epub' && book.epubScrollPct != null) return book.epubScrollPct;
  return Math.round(((book.currentPage||1) / book.totalPages) * 100);
}

// מרנדר פאנל סטטיסטיקות ומידע על שלמות נתוני הספרים
function renderInfoPanel() {
  const total = S.books.length;
  if (!total) return '';
  const missingCounts = { 'מחבר': 0, 'כריכה': 0, 'הוצאה': 0, 'שנה': 0, 'ז׳אנר': 0 };
  let completeCount = 0, missingCount = 0;
  for (const b of S.books) {
    const m = missingFields(b);
    if (m.length === 0) { completeCount++; } else { missingCount++; m.forEach(f => missingCounts[f]++); }
  }
  const active = S.libInfoFilter;
  const chip = (val, label, count, color) =>
    `<button class="info-chip ${active===val?'info-chip-active':''}" style="${active===val?`--chip-color:${color}`:''}" onclick="S.libInfoFilter=S.libInfoFilter==='${val}'?null:'${val}';renderTabContent()">${label} <span class="info-chip-count">${count}</span></button>`;

  const missingChips = Object.entries(missingCounts)
    .filter(([,c]) => c > 0)
    .map(([f,c]) => chip(`missing:${f}`, `חסר ${f}`, c, '#e67e22'))
    .join('');

  const showBreakdown = S.libInfoBreakdownOpen && missingChips;
  return `<div class="info-panel">
    <div class="info-panel-stats">
      <span class="info-stat-total">סה"כ <strong>${total}</strong> ספרים</span>
      <span class="info-stat-sep">•</span>
      ${chip('complete','מידע מלא', completeCount, '#27ae60')}
      ${chip('missing','חסר מידע', missingCount, '#e74c3c')}
      ${missingChips ? `<button class="info-chip" style="margin-right:auto" onclick="S.libInfoBreakdownOpen=!S.libInfoBreakdownOpen;renderTabContent()" title="פירוט לפי שדה">${showBreakdown ? '▲' : '▼'} פירוט</button>` : ''}
    </div>
    ${showBreakdown ? `<div class="info-panel-breakdown">${missingChips}</div>` : ''}
  </div>`;
}

// מרנדר סרגל בחירה מרובה לפעולות על ספרים מסומנים

const ITEM_TYPES = [
  { v: null,       l: '📋 הכל' },
  { v: 'book',     l: '📚 ספרים' },
  { v: 'booklet',  l: '📄 חוברות' },
  { v: 'journal',  l: '📰 כתבי עת' },
  { v: 'article',  l: '✍️ מאמרים' },
  { v: 'misc',     l: '🗂 שונות' },
];
const ITEM_TYPE_LABEL = { book:'ספר', booklet:'חוברת', journal:'כתב עת', article:'מאמר', misc:'שונות' };

// מרנדר את לשונית הספרים עם רשימה או גריד של ספרים
function renderBooksTab() {
  const books = getSortedBooks();
  const hasFilters = S.libTypeFilter || S.libFormatFilter || S.libLangFilter || S.libSearch?.trim() || S.libInfoFilter;
  const countLine = `<div class="lib-count-bar">${hasFilters ? `מציג ${books.length} מתוך ${S.books.length}` : `${S.books.length} פריטים`}</div>`;
  if (!books.length && !S.books.length) return `<div class="empty-state">
    <div style="font-size:4rem">📚</div>
    <p>הספרייה ריקה</p>
    <button class="btn-primary" onclick="showAddModal()">הוסף את הספר הראשון</button>
  </div>`;
  if (!books.length) return countLine + `<div class="empty-state"><div style="font-size:3rem">🔍</div>
    <p>אין פריטים התואמים לסינון הנוכחי</p>
    <button class="btn-secondary" onclick="S.libInfoFilter=null;S.libTypeFilter=null;S.libFormatFilter=null;S.libLangFilter=null;S.libSearch='';renderLib()">הסר סינון</button></div>`;
  let listHtml;
  if (S.libGroupBy) {
    listHtml = renderGroupedBooks(books);
  } else if (S.libView === 'grid') {
    listHtml = `<div class="book-grid">${books.map(bookGridCard).join('')}</div>`;
  } else {
    listHtml = `<div class="book-list">${books.map(bookListCard).join('')}</div>`;
  }
  return countLine + listHtml + renderSelectBar(books);
}

// מחזיר HTML של כריכת ספר או תחליף צבעוני אם אין כריכה
function bookCoverHtml(book, cls) {
  if (book.coverUrl) {
    return `<img src="${esc(book.coverUrl)}" class="${cls}" alt=""
      onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="${cls} cover-placeholder" style="display:none">${(book.title||'?')[0]}</div>`;

// מחזיר שורת מטאדטה מותאמת לסוג הפריט
function _metaLineForType(book) {
  const type = book.itemType || 'book';
  if (type === 'journal') {
    return [
      book.editor    ? fchips(splitField(book.editor),'fchip-author')           : '',
      book.volume    ? `<span class="muted" style="font-size:0.75rem">כרך ${esc(book.volume)}</span>` : '',
      book.issue     ? `<span class="muted" style="font-size:0.75rem">גיל׳ ${esc(book.issue)}</span>`  : '',
      book.issueDate ? `<span class="muted" style="font-size:0.75rem">${esc(book.issueDate)}</span>`    : '',
    ].filter(Boolean).join('');
  }
  if (type === 'article') {
    return [
      book.author     ? fchips(splitField(book.author),'fchip-author')           : '',
      book.journalPub ? `<span class="fchip fchip-pub">${esc(book.journalPub)}</span>` : '',
      (book.pageFrom||book.pageTo) ? `<span class="muted" style="font-size:0.75rem">עמ׳ ${esc(book.pageFrom||'')}–${esc(book.pageTo||'')}</span>` : '',
      book.issueDate  ? `<span class="muted" style="font-size:0.75rem">${esc(book.issueDate)}</span>` : '',
    ].filter(Boolean).join('');
  }
  // book / booklet / misc
  return [
    book.author                          ? fchips(splitField(book.author),'fchip-author')    : '',
    (book.publisher||book.organization)  ? fchips(splitField(book.publisher||book.organization),'fchip-pub') : '',
    book.genre                           ? fchips(splitField(book.genre),'fchip-genre')      : '',
    book.year                            ? `<span class="muted" style="font-size:0.75rem">${esc(book.year)}</span>` : '',
  ].filter(Boolean).join('');
}

// מציג את חלון ההוספה של ספר חדש
function showAddModal() { $id('addModal').style.display='flex'; }
// סוגר את חלון הוספת הספר
function closeAddModal() { $id('addModal').style.display='none'; }

// מטפל בקבצי PDF ו-EPUB שנבחרו ומוסיף אותם לספרייה
async function handleFiles(files) {
  closeAddModal();
  const arr = Array.from(files);
  let skipped = 0;
  for (const file of arr) {
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['pdf','epub'].includes(ext)) continue;
    const normalizedTitle = file.name.replace(/\.[^.]+$/, '');
    if (S.books.some(b => b.title === normalizedTitle)) { skipped++; continue; }
    const ab = await file.arrayBuffer();
    const book = {
      id: uid(), title: normalizedTitle, author: '',
      publisher: '', year: '', genre: '', format: ext,
      coverUrl: '', currentPage: 1, totalPages: 0,
      shelves: [], series: [], customFields: {}, dateAdded: Date.now(), lastRead: null,
    };
    if (ext === 'pdf') {
      try {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const doc = await pdfjsLib.getDocument({
          data: ab.slice(0), useSystemFonts: true,
          standardFontDataUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/standard_fonts/'
        }).promise;
        book.totalPages = doc.numPages;
        // cover from page 1
        try {
          const page = await doc.getPage(1);
          const vp = page.getViewport({ scale: 0.4 });
          const canvas = document.createElement('canvas');
          canvas.width = Math.round(vp.width); canvas.height = Math.round(vp.height);
          await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
          book.coverUrl = canvas.toDataURL('image/jpeg', 0.7);
        } catch(e) {}
        // metadata
        try {
          const { info, metadata } = await doc.getMetadata();
          const get = k => (info[k] || '').toString().trim();
          const xmp = k => { try { return metadata?.get(k)?.trim() || ''; } catch(_) { return ''; } };
          const yr = (get('CreationDate').match(/D:(\d{4})/) || get('CreationDate').match(/(\d{4})/))?.[1] || '';
          const metaTitle = get('Title') || xmp('dc:title');
          if (metaTitle) book.title = metaTitle;
          const metaAuthor = get('Author') || xmp('dc:creator');
          if (metaAuthor) book.author = metaAuthor;
          const metaPub = xmp('dc:publisher');
          if (metaPub) book.publisher = metaPub;
          if (yr) book.year = yr;
          const metaGenre = get('Subject') || xmp('dc:subject');
          if (metaGenre) book.genre = metaGenre;
          const metaLang = get('Language') || xmp('dc:language');
          if (metaLang) book.language = _normalizeLang(metaLang);
        } catch(e) {}
        // זיהוי שפה מטקסט אם לא נמצאה במטאדטה
        if (!book.language) {
          try {
            const page = await doc.getPage(1);
            const content = await page.getTextContent();
            book.language = _detectLangFromText(content.items.map(i=>i.str).join(''));
          } catch(e) {}
        }
        doc.destroy();
      } catch(e) { console.warn('PDF error', e); }
    }
    if (ext === 'epub') {
      try {
        const zip = await JSZip.loadAsync(ab.slice(0));
        const [cover, meta] = await Promise.all([extractEpubCoverFromZip(zip), extractEpubMeta(zip)]);
        if (cover) book.coverUrl = cover;
        if (meta.title) book.title = meta.title;
        if (meta.subtitle) book.subtitle = meta.subtitle;
        if (meta.author) book.author = meta.author;
        if (meta.publisher) book.publisher = meta.publisher;
        if (meta.year) book.year = meta.year;
        if (meta.genre) book.genre = meta.genre;
        if (meta.language) book.language = meta.language;
        if (meta.description) book.description = meta.description;
      } catch(e) { console.warn('EPUB error', e); }
    }
    await dbPut('files', { id: book.id, data: ab });
    await dbPut('books', book);
    S.books.push(book);
  }
  renderLib();
  if (skipped) showToast(`${skipped} ספר${skipped>1?'ים':''} כבר קיים${skipped>1?'ים':''} בספרייה`);
}

// פותח בורר תיקיות וסורק רקורסיבית אחר קבצי ספרים
async function openFolder() {
  if (!window.showDirectoryPicker) return alert('תכונה זו זמינה רק ב-Chrome/Edge');
  try {
    const dir = await window.showDirectoryPicker();
    closeAddModal();
    const files = [];
    async function scan(handle, depth) {
      if (depth > 3) return;
      for await (const entry of handle.values()) {
        if (entry.kind === 'file' && /\.(pdf|epub)$/i.test(entry.name))
          files.push(await entry.getFile());
        else if (entry.kind === 'directory') await scan(entry, depth+1);
      }
    }
    await scan(dir, 0);
    if (files.length) await handleFiles(files);
    else alert('לא נמצאו קבצי PDF/EPUB בתיקייה');
  } catch(e) { if (e.name !== 'AbortError') alert('שגיאה: '+e.message); }
}

      </select>

  </div>

  <div class="form-grid">
    <label style="grid-column:1/-1">כותרת<input type="text" id="eTitle" value="${esc(book.title||'')}"></label>

    <div data-field="f-subtitle"><label>תת כותרת<input type="text" id="eSubtitle" value="${esc(book.subtitle||'')}" placeholder="אם קיימת"></label></div>

// שומר את השינויים בפרטי הספר ומסגר את חלון העריכה
async function saveEditBook() {
  const id = $id('editBookId').value;
  const book = S.books.find(b => b.id === id);
  if (!book) return;
  const _v = id => ($id(id)?.value ?? '').trim();
  book.itemType     = _v('eItemType') || 'book';
  book.title        = _v('eTitle');
  book.subtitle     = _v('eSubtitle');
  book.author       = _v('eAuthor');
  book.editor       = _v('eEditor');
  book.publisher    = _v('ePublisher');
  book.organization = _v('eOrganization');
  book.journalPub   = _v('eJournalPub');
  book.year         = _v('eYear');
  book.volume       = _v('eVolume') ? Number(_v('eVolume')) : '';
  book.issue        = _v('eIssue');
  book.issueDate    = _v('eIssueDate');
  book.pageFrom     = _v('ePageFrom') ? Number(_v('ePageFrom')) : '';
  book.pageTo       = _v('ePageTo')   ? Number(_v('ePageTo'))   : '';
  book.doi          = _v('eDoi');
  book.isbn         = _v('eIsbn');
  book.edition      = _v('eEdition');
  book.issn         = _v('eIssn');
  book.genre        = _v('eGenre');
  book.language     = _v('eLanguage');
  book.description  = _v('eDescription');
  book.shelves = [...document.querySelectorAll('input[name="shelf"]:checked')].map(el => el.value);
  book.series  = [...document.querySelectorAll('input[name="series"]:checked')].map(el => el.value);
  const seriesNums = {}, shelfNums = {};
  document.querySelectorAll('.snum-input').forEach(inp => {
    const v = parseFloat(inp.value);
    if (!isNaN(v) && v > 0) {
      if (inp.dataset.type === 'series') seriesNums[inp.dataset.id] = v;
      else shelfNums[inp.dataset.id] = v;
    }
  });
  book.seriesNums = seriesNums;
  book.shelfNums  = shelfNums;
  const cf = {};
  document.querySelectorAll('.custom-field-row').forEach(row => {
    const k = row.querySelector('.cf-key').value.trim();
    const v = row.querySelector('.cf-val').value.trim();
    if (k) cf[k] = v;
  });
  book.customFields = cf;
  await dbPut('books', bookMeta(book));
  $id('editModal').style.display = 'none';
  renderLib();
}

// מחלץ את עמוד 1 מה-PDF ומגדיר אותו ככריכת הספר
async function setCoverFromPdf(bookId) {
  const book = S.books.find(b=>b.id===bookId);
  if (!book) return;
  const fileRecord = await dbGet('files', bookId);
  if (!fileRecord?.data) return alert('נתוני הספר חסרים.');
  const url = await extractPdfCover(fileRecord.data.slice ? fileRecord.data.slice(0) : fileRecord.data);
  if (!url) return alert('לא ניתן לחלץ כריכה');
  book.coverUrl = url;
  await dbPut('books', bookMeta(book));
  editBook(bookId);
}

// קורא קובץ תמונה שנבחר ומגדיר אותו ככריכת הספר
function setCoverFromFile(input, bookId) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    const book = S.books.find(b=>b.id===bookId);
    if (!book) return;
    book.coverUrl = e.target.result;
    await dbPut('books', bookMeta(book));
    editBook(bookId);
  };
  reader.readAsDataURL(file);
}

// שומר כתובת URL של תמונה ככריכת הספר
async function setCoverFromUrl(bookId) {
  const url = $id('eCoverUrl').value.trim();
  const book = S.books.find(b=>b.id===bookId);
  if (!book||!url) return;
  book.coverUrl = url;
  await dbPut('books', bookMeta(book));
  editBook(bookId);
}

// מבקש אישור מהמשתמש ומוחק ספר בודד
async function confirmDelete(bookId) {
  const book = S.books.find(b=>b.id===bookId);
  if (!book||!confirm(`למחוק את "${book.title}"?`)) return;
  await _deleteBookById(bookId);
  S.books = S.books.filter(b=>b.id!==bookId);
  renderLib();
}

// מוחק ספר ואת כל הנתונים הקשורים אליו ממסד הנתונים
async function _deleteBookById(bookId) {
  await dbDelete('books', bookId);
  await dbDelete('files', bookId);
  const anns = await dbGetByIndex('annotations','bookId',bookId);
  for (const a of anns) await dbDelete('annotations', a.id);
  const dicts = await dbGetByIndex('dictionary','bookId',bookId);
  for (const d of dicts) await dbDelete('dictionary', d.id);
  const bms = await dbGetByIndex('bookmarks','bookId',bookId);
  for (const bm of bms) await dbDelete('bookmarks', bm.id);
  const sessions = await dbGetByIndex('readingSessions','bookId',bookId);
  for (const s of sessions) await dbDelete('readingSessions', s.id);
}

// ═══ BOOK PICKER ═══
let _bookPickerType = null; // 'shelf' or 'series'
let _bookPickerTargetId = null;

// פותח חלון בחירת ספרים לשיוך למדף או לסדרה
function showBookPicker(type, targetId) {
  _bookPickerType = type;
  _bookPickerTargetId = targetId;
  const target = type === 'shelf'
    ? S.shelves.find(s => s.id === targetId)
    : S.seriesList.find(s => s.id === targetId);
  $id('bookPickerTitle').textContent = `📚 ${type === 'shelf' ? 'מדף' : 'סדרה'}: ${target ? target.name : ''}`;
  const field = type === 'shelf' ? 'shelves' : 'series';
  const items = S.books.map(b => {
    const checked = (b[field] || []).includes(targetId) ? 'checked' : '';
    const cover = b.coverUrl
      ? `<img class="cover-xs" src="${b.coverUrl}" alt="">`
      : `<div class="cover-xs" style="background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:1.1rem">📖</div>`;
    return `<label class="book-picker-item">
      <input type="checkbox" name="bpick" value="${b.id}" ${checked}>
      ${cover}
      <span class="picker-title">${esc(b.title)}</span>
    </label>`;
  }).join('');
  $id('bookPickerBody').innerHTML = items || '<p style="padding:16px;color:var(--muted)">אין ספרים בספרייה</p>';
  $id('bookPickerModal').style.display = 'flex';
}

// שומר את השיוך של הספרים שנבחרו למדף או לסדרה
async function saveBookPicker() {
  if (!_bookPickerType || !_bookPickerTargetId) return;
  const field = _bookPickerType === 'shelf' ? 'shelves' : 'series';
  const selected = new Set([...document.querySelectorAll('input[name="bpick"]:checked')].map(el => el.value));
  const changed = [];
  for (const b of S.books) {
    const had = (b[field] || []).includes(_bookPickerTargetId);
    const wants = selected.has(b.id);
    if (had === wants) continue;
    if (wants) b[field] = [...(b[field] || []), _bookPickerTargetId];
    else b[field] = (b[field] || []).filter(x => x !== _bookPickerTargetId);
    changed.push(b);
  }
  for (const b of changed) await dbPut('books', bookMeta(b));
  $id('bookPickerModal').style.display = 'none';
  renderLib();
  if (changed.length) showToast(`עודכן: ${changed.length} ספרים`);
}

// ═══ OPEN BOOK ═══
// טוען ספר ממסד הנתונים ופותח אותו בממשק הקורא
async function openBook(bookId) {
  const book = S.books.find(b=>b.id===bookId);
  if (!book) return;
  const fileRecord = await dbGet('files', bookId);
  if (!fileRecord?.data) return alert('נתוני הספר חסרים. הוסף את הקובץ מחדש.');
  S._libScrollTop = $id('libContent')?.scrollTop ?? 0;
  if (S._pdfObserver) { S._pdfObserver.disconnect(); S._pdfObserver = null; }
  S.currentBook = book;
  S.currentBook._fileData = fileRecord.data;
  S.currentPage = book.currentPage || 1;
  S.pdfDoc = null;
  S.pdfOutline = [];
  S.epubChapters = [];
  S.epubChapterIdx = 0;
  S.epubZip = null;
  S.epubImages = {};
  S.annotations = await dbGetByIndex('annotations','bookId',bookId);
  S.dictionary = await dbGetAll('dictionary');
  S.bookmarks = await dbGetByIndex('bookmarks','bookId',bookId);
  S.bookSessions = await dbGetByIndex('readingSessions','bookId',bookId);
  S._sessionStart = Date.now();
  S._sessionPomodoros = 0;
  S._sessionInterruptions = 0;
  S.pomodorosDone = 0;
  book.lastRead = S._sessionStart;
  await dbPut('books', bookMeta(book));

  $id('libPage').style.display = 'none';
  $id('readerPage').style.display = 'flex';
  renderReaderUI();

  if (book.format === 'pdf') await initPdf(S.currentBook._fileData);
  else if (book.format === 'epub') await initEpub(S.currentBook._fileData);
}

// סוגר את הקורא וחוזר לתצוגת הספרייה
async function closeReader() {
  if (S.currentBook && S._sessionStart) {
    const duration = Math.round((Date.now() - S._sessionStart) / 1000);
    if (duration > 30) {
      await dbPut('readingSessions', {
        id: uid(), bookId: S.currentBook.id,
        startTime: S._sessionStart, endTime: Date.now(),
        duration, pomodorosCompleted: S._sessionPomodoros, interruptions: S._sessionInterruptions
      });
    }
  }
  S._sessionStart = null;
  clearTimerInterval();
  if (S._pdfObserver) { S._pdfObserver.disconnect(); S._pdfObserver = null; }
  clearTimeout(S._pdfSaveTimer);
  $id('readerPage').style.display = 'none';
  $id('libPage').style.display = 'flex';
  if (S.currentBook) S.currentBook._fileData = null;
  S.currentBook = null;
  S.pdfDoc = null;
  const savedScroll = S._libScrollTop ?? 0;
  S._libScrollTop = null;
  renderLib(savedScroll);
}

          `<button class="stab ${S.readerPanel===p?'active':''}" onclick="switchPanel('${p}')">${ic}</button>`
        ).join('')}
      </div>
      <div id="sidebarContent"></div>

  </div>`;
  switchPanel(S.readerPanel);
}

// מחליף את הפאנל הפעיל בסרגל הצדדי של הקורא
function switchPanel(panel) {
  S.readerPanel = panel;
  document.querySelectorAll('.stab').forEach(b => {
    const map = {timer:'⏱',notes:'📝',dict:'📒',bookmarks:'🔖',stats:'📊',settings:'⚙️'};
    b.classList.toggle('active', b.textContent.trim() === map[panel]);
  });
  const el = $id('sidebarContent');
  if (!el) return;
  if (panel === 'timer') el.innerHTML = renderTimerPanel();
  else if (panel === 'notes') el.innerHTML = renderNotesPanel();
  else if (panel === 'dict') el.innerHTML = renderDictPanel();
  else if (panel === 'bookmarks') el.innerHTML = renderBookmarksPanel();
  else if (panel === 'stats') el.innerHTML = renderStatsPanel();
  else if (panel === 'settings') el.innerHTML = renderSettingsPanel();
}

// ═══ TIMER ═══
// מרנדר את פאנל הטיימר עם שעון עגול ובקרות פומודורו
function renderTimerPanel() {
  const totalSec = S.timerMin * 60 + S.timerSec;
  const origTotal = (S.timerRunning || totalSec < S.timerTotal) ? S.timerTotal : totalSec;
  const pct = origTotal > 0 ? Math.round(((origTotal - totalSec) / origTotal) * 100) : 0;
  const r = 52, circ = 2 * Math.PI * r;
  const offset = circ * (1 - pct / 100);
  const mm = String(Math.floor(totalSec / 60)).padStart(2,'0');
  const ss = String(totalSec % 60).padStart(2,'0');
  return `<div class="timer-panel">
    <svg width="130" height="130" class="timer-ring">
      <circle cx="65" cy="65" r="${r}" fill="none" stroke="var(--border)" stroke-width="8"/>
      <circle cx="65" cy="65" r="${r}" fill="none" stroke="var(--accent)" stroke-width="8"
        stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"
        stroke-linecap="round" transform="rotate(-90 65 65)"/>
      <text x="65" y="65" text-anchor="middle" dominant-baseline="middle"
        fill="var(--text)" font-size="22" font-weight="bold">${mm}:${ss}</text>
    </svg>
    <div class="timer-controls">
      ${S.timerRunning
        ? `<button class="btn-secondary" onclick="pauseTimer()">⏸ עצור</button>`
        : `<button class="btn-primary" onclick="startTimer()">▶ התחל</button>`}
      <button class="btn-secondary" onclick="resetTimer()">↺</button>
    </div>
    <div class="timer-presets">
      ${[5,10,15,25,45].map(m=>
        `<button class="preset-btn ${!S.timerRunning&&Math.floor(totalSec/60)===m&&totalSec%60===0?'active':''}"
          onclick="if(!S.timerRunning){S.timerMin=${m};S.timerSec=0;S.timerTotal=${m*60};switchPanel('timer')}">${m}׳</button>`
      ).join('')}
    </div>
    <div class="pomodoros-done">🍅 ${S.pomodorosDone} פומודורו</div>
    <div class="pomodoros-done" style="font-size:0.75rem;color:var(--muted);margin-top:2px">⏱ ${fmtReadingTime(S._sessionStart ? Math.round((Date.now()-S._sessionStart)/1000) : 0)} בסשן זה</div>
  </div>`;
}

// מתחיל את הספירה לאחור של טיימר הפוקוס
function startTimer() {
  if (S.timerRunning) return;
  if (S.timerMin === 0 && S.timerSec === 0) return;
  S.timerTotal = S.timerMin * 60 + S.timerSec;
  S.timerRunning = true;
  S.timerInterval = setInterval(() => {
    if (S.timerSec > 0) S.timerSec--;
    else if (S.timerMin > 0) { S.timerMin--; S.timerSec = 59; }
    else {
      clearTimerInterval();
      S.timerRunning = false;
      S.pomodorosDone++;
      S._sessionPomodoros++;
      S.timerMin = Math.round(S.timerTotal / 60);
      S.timerSec = 0;
    }
    if (S.readerPanel === 'timer') switchPanel('timer');
  }, 1000);
  switchPanel('timer');
}
// עוצר את הטיימר הפעיל מבלי לאפס אותו
function pauseTimer() { if (S.timerRunning) S._sessionInterruptions++; clearTimerInterval(); S.timerRunning = false; switchPanel('timer'); }
// מאפס את הטיימר לזמן ההתחלתי
function resetTimer() {
  clearTimerInterval(); S.timerRunning = false;
  S.timerMin = Math.round(S.timerTotal / 60) || 25;
  S.timerSec = 0;
  switchPanel('timer');
}
// מבטל את interval הטיימר הפעיל אם קיים
function clearTimerInterval() { if (S.timerInterval) { clearInterval(S.timerInterval); S.timerInterval = null; } }

// ═══ READING STATS ═══
function fmtReadingTime(secs) {
  if (!secs || secs < 0) return '—';
  const m = Math.round(secs / 60);
  if (m < 1) return `${secs}ש`;
  if (m < 60) return `${m} דק׳`;
  const h = Math.floor(m / 60);
  const rm = m % 60;
  return rm ? `${h}ש׳ ${rm}ד׳` : `${h} ש׳`;
}

function renderStatsPanel() {
  const sessions = S.bookSessions || [];
  const curDuration = S._sessionStart ? Math.round((Date.now() - S._sessionStart) / 1000) : 0;
  const totalTime = sessions.reduce((sum, s) => sum + (s.duration || 0), 0) + curDuration;
  const totalPomodoros = sessions.reduce((sum, s) => sum + (s.pomodorosCompleted || 0), 0) + S._sessionPomodoros;
  const totalInterruptions = sessions.reduce((sum, s) => sum + (s.interruptions || 0), 0) + S._sessionInterruptions;

  const days = 14;
  const now = Date.now();
  const dayMs = 86400000;
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const dayData = Array.from({length: days}, (_, i) => {
    const dayStart = now - (days - 1 - i) * dayMs;
    const dayEnd = dayStart + dayMs;
    const label = new Date(dayStart).toLocaleDateString('he-IL', {day:'numeric', month:'numeric'});
    let secs = sessions.filter(s => s.startTime >= dayStart && s.startTime < dayEnd).reduce((sum, s) => sum + (s.duration || 0), 0);
    if (i === days - 1 && S._sessionStart >= todayStart.getTime()) secs += curDuration;
    return { label, secs };
  });
  const maxSecs = Math.max(...dayData.map(d => d.secs), 1);
  const chartBars = dayData.map((d, i) => {
    const pct = Math.round((d.secs / maxSecs) * 100);
    const isToday = i === days - 1;
    const opacity = d.secs === 0 ? 'opacity:0.15;' : '';
    const color = isToday ? 'var(--accent)' : 'var(--primary)';
    const showLabel = i === 0 || i === Math.floor(days/2) || isToday;
    return `<div class="chart-bar-wrap">
      <div class="chart-bar" style="height:${Math.max(pct,1)}%;background:${color};${opacity}"></div>
      <div class="chart-bar-label">${showLabel ? d.label : ''}</div>
    </div>`;
  }).join('');

  const noData = sessions.length === 0 && !curDuration;
  return `<div class="stats-panel">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon">⏱</div>
        <div class="stat-info">
          <div class="stat-value">${fmtReadingTime(totalTime)}</div>
          <div class="stat-label">זמן קריאה כולל</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🍅</div>
        <div class="stat-info">
          <div class="stat-value">${totalPomodoros}</div>
          <div class="stat-label">פומודורו</div>
        </div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">⚡</div>
      <div class="stat-info">
        <div class="stat-value">${totalInterruptions}</div>
        <div class="stat-label">הפרעות (עצירת טיימר)</div>
      </div>
    </div>
    <div class="stat-chart-wrap">
      <div class="stat-chart-title">זמן קריאה — 14 הימים האחרונים</div>
      <div class="chart-bars">${chartBars}</div>
    </div>
    ${noData ? '<p class="muted" style="text-align:center;margin-top:12px">אין נתוני קריאה עדיין</p>' : ''}
    <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">
      <button class="export-btn" style="flex:1;justify-content:center" onclick="openPrintReport()">🖨️ דוח להדפסה</button>
      <button class="export-btn" style="flex:1;justify-content:center" onclick="exportReadingReportCSV()">📊 CSV</button>
    </div>
  </div>`;
}

async function loadAndRenderLibStats() {
  const el = $id('libContent');
  if (!el) return;
  const allSessions = await dbGetAll('readingSessions');
  if (S.libTab !== 'stats') return;
  const totalTime = allSessions.reduce((s, r) => s + (r.duration || 0), 0);
  const totalPomodoros = allSessions.reduce((s, r) => s + (r.pomodorosCompleted || 0), 0);
  const totalInterruptions = allSessions.reduce((s, r) => s + (r.interruptions || 0), 0);
  const totalSessions = allSessions.length;

  if (!totalSessions) {
    el.innerHTML = `<div class="empty-state"><div style="font-size:3rem">📊</div>
      <p>אין נתוני קריאה עדיין</p>
      <p class="muted">פתח ספר וקרא כדי לעקוב אחר ההתקדמות שלך</p></div>`;
    return;
  }

  const bookStats = {};
  for (const session of allSessions) {
    if (!bookStats[session.bookId]) bookStats[session.bookId] = { time: 0, pomodoros: 0, sessions: 0 };
    bookStats[session.bookId].time += session.duration || 0;
    bookStats[session.bookId].pomodoros += session.pomodorosCompleted || 0;
    bookStats[session.bookId].sessions++;
  }

  const days = 30;
  const now = Date.now();
  const dayMs = 86400000;
  const dayData = Array.from({length: days}, (_, i) => {
    const dayStart = now - (days - 1 - i) * dayMs;
    const dayEnd = dayStart + dayMs;
    const label = new Date(dayStart).toLocaleDateString('he-IL', {day:'numeric', month:'numeric'});
    const secs = allSessions.filter(s => s.startTime >= dayStart && s.startTime < dayEnd).reduce((sum, s) => sum + (s.duration || 0), 0);
    return { label, secs };
  });
  const maxSecs = Math.max(...dayData.map(d => d.secs), 1);
  const chartBars = dayData.map((d, i) => {
    const pct = Math.round((d.secs / maxSecs) * 100);
    const isToday = i === days - 1;
    const opacity = d.secs === 0 ? 'opacity:0.15;' : '';
    const color = isToday ? 'var(--accent)' : 'var(--primary)';
    const showLabel = i === 0 || i === 10 || i === 20 || isToday;
    return `<div class="chart-bar-wrap">
      <div class="chart-bar" style="height:${Math.max(pct,1)}%;background:${color};${opacity}"></div>
      <div class="chart-bar-label">${showLabel ? d.label : ''}</div>
    </div>`;
  }).join('');

  const sortedBooks = S.books
    .filter(b => bookStats[b.id])
    .sort((a, b) => (bookStats[b.id]?.time || 0) - (bookStats[a.id]?.time || 0));

  el.innerHTML = `
  <div class="export-btns-row">
    <button class="export-btn" onclick="exportReadingReportCSV()">📊 דוח קריאה CSV</button>
    <button class="export-btn" onclick="exportCatalogCSV()">📋 קטלוג CSV</button>
    <button class="export-btn" onclick="openPrintReport()">🖨️ דוח להדפסה</button>
  </div>
  <div class="lib-stats-summary">
    <div class="lib-stat-chip">
      <div class="stat-value">${fmtReadingTime(totalTime)}</div>
      <div class="stat-label">זמן קריאה כולל</div>
    </div>
    <div class="lib-stat-chip">
      <div class="stat-value">${totalPomodoros}</div>
      <div class="stat-label">פומודורו</div>
    </div>
    <div class="lib-stat-chip">
      <div class="stat-value">${totalSessions}</div>
      <div class="stat-label">ישיבות קריאה</div>
    </div>
    <div class="lib-stat-chip">
      <div class="stat-value">${totalInterruptions}</div>
      <div class="stat-label">הפרעות</div>
    </div>
  </div>
  <div class="stat-chart-wrap" style="margin-bottom:16px">
    <div class="stat-chart-title">פעילות קריאה — 30 ימים אחרונים</div>
    <div class="chart-bars" style="height:80px">${chartBars}</div>
  </div>
  ${sortedBooks.length ? `<div class="stat-chart-title" style="margin-bottom:8px">ספרים לפי זמן קריאה</div>
  <div class="lib-stats-table">
    ${sortedBooks.map(b => {
      const st = bookStats[b.id];
      return `<div class="lib-stats-row">
        <div class="lib-stats-book">
          <div class="lib-stats-book-title">${esc(b.title)}</div>
          ${b.author ? `<div class="muted" style="font-size:0.75rem">${esc(b.author)}</div>` : ''}
        </div>
        <div class="lib-stats-nums">
          <div class="lib-stats-num"><span class="num-val">${fmtReadingTime(st.time)}</span><span class="num-lbl">זמן</span></div>
          <div class="lib-stats-num"><span class="num-val">🍅${st.pomodoros}</span><span class="num-lbl">פומודורו</span></div>
          <div class="lib-stats-num"><span class="num-val">${st.sessions}</span><span class="num-lbl">ישיבות</span></div>
        </div>
      </div>`;
    }).join('')}
  </div>` : ''}`;
}

// ═══ EXPORT / DOWNLOAD ═══
function _downloadFile(content, filename, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function _csvVal(v) {
  const s = (v === null || v === undefined) ? '' : String(v);
  return (s.includes(',') || s.includes('"') || s.includes('\n')) ? `"${s.replace(/"/g,'""')}"` : s;
}

function _dateStr(ts) {
  return ts ? new Date(ts).toLocaleDateString('he-IL') : '';
}

// ═══ IMPORT CSV ═══
let _importData = [];

function importCatalogCSV() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.csv,.tsv,.txt';
  input.onchange = async e => {
    const file = e.target.files[0];
    if (!file) return;
    const text = await file.text();
    _parseAndProcessImport(text);
  };
  input.click();
}

// מנתח CSV גנרי עם תמיכה בשדות מצוטטים
function _parseCSVRows(text) {
  const clean = text.replace(/^﻿/, '');
  const lines = clean.split(/\r?\n/);
  const rows = [];
  for (const line of lines) {
    if (!line.trim()) continue;
    const fields = [];
    let field = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { if (inQ && line[i+1] === '"') { field += '"'; i++; } else inQ = !inQ; }
      else if (c === ',' && !inQ) { fields.push(field.trim()); field = ''; }
      else field += c;
    }
    fields.push(field.trim());
    rows.push(fields);
  }
  return rows;
}

// מזהה עמודות רלוונטיות מכותרות הטבלה
function _detectImportColumns(headers) {
  const map = { genreCols: [] };
  headers.forEach((h, i) => {
    const n = h.replace(/['"״]/g, '').trim().toLowerCase();
    if (['שם','title','כותרת','book title','שם ספר'].includes(n)) map.title = i;
    else if (['מחבר','author','authors','מחברים'].includes(n)) map.author = i;
    else if (['הוצאה לאור','הוצאה','publisher','publishers'].includes(n)) map.publisher = i;
    else if (['שנה','year','שנת הוצאה','publication year'].includes(n)) map.year = i;
    else if (['עמודים','pages','total pages','מספר עמודים'].includes(n)) map.totalPages = i;
    else if (['שפה','language','lang'].includes(n)) map.language = i;
    else if (['תת כותרת','subtitle','תת-כותרת'].includes(n)) map.subtitle = i;
    else if (['תקציר','description','תיאור','summary'].includes(n)) map.description = i;
    else if (['סוג','type','item type','itemtype'].includes(n)) map.itemType = i;
    else if (['עורך','editor'].includes(n)) map.editor = i;
    else if (['מדפים','shelves','shelf','מדף'].includes(n)) map.shelves = i;
    else if (['סדרות','series'].includes(n)) map.series = i;
    else if (n.includes("ז'אנר") || n.includes("ז'נר") || n.includes('genre') || n.includes('ז') && n.includes('אנר')) {
      map.genreCols.push(i);
    }
  });
  return map;
}

// מנרמל ערך רב-שדות (מפצל לפי ; , / |) ומסיר כפילויות
function _normalizeMultiVal(val) {
  if (!val) return [];
  return [...new Set(val.split(/[;,|/]+/).map(s => s.trim()).filter(Boolean))];
}

function _parseAndProcessImport(text) {
  const rows = _parseCSVRows(text);
  if (rows.length < 2) return showToast('קובץ CSV ריק או לא תקין');

  const colMap = _detectImportColumns(rows[0]);
  if (colMap.title === undefined) return showToast('לא נמצאה עמודת שם ספר בקובץ (צפוי: "שם" או "title")');

  const bookByTitle = new Map();
  for (const b of S.books) bookByTitle.set((b.title || '').trim().toLowerCase(), b);

  const FIELDS = [
    { key: 'author',      label: 'מחבר',        multi: true },
    { key: 'editor',      label: 'עורך',         multi: true },
    { key: 'publisher',   label: 'הוצאה לאור',  multi: true },
    { key: 'year',        label: 'שנה',          multi: false },
    { key: 'totalPages',  label: 'עמודים',       multi: false },
    { key: 'genre',       label: "ז'אנר",        multi: true },
    { key: 'language',    label: 'שפה',          multi: false },
    { key: 'subtitle',    label: 'תת כותרת',    multi: false },
    { key: 'description', label: 'תקציר',        multi: false },
    { key: 'itemType',    label: 'סוג',          multi: false },
  ];

  const importData = [];
  const notFound = [];

  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    const title = colMap.title !== undefined ? (row[colMap.title] || '').trim() : '';
    if (!title) continue;

    const book = bookByTitle.get(title.toLowerCase());
    if (!book) { notFound.push(title); continue; }

    // איסוף ערכים נכנסים
    const incoming = {};
    if (colMap.author !== undefined) incoming.author = (row[colMap.author] || '').trim();
    if (colMap.editor !== undefined) incoming.editor = (row[colMap.editor] || '').trim();
    if (colMap.publisher !== undefined) incoming.publisher = (row[colMap.publisher] || '').trim();
    if (colMap.year !== undefined) incoming.year = (row[colMap.year] || '').trim();
    if (colMap.totalPages !== undefined) incoming.totalPages = (row[colMap.totalPages] || '').trim();
    if (colMap.language !== undefined) incoming.language = (row[colMap.language] || '').trim();
    if (colMap.subtitle !== undefined) incoming.subtitle = (row[colMap.subtitle] || '').trim();
    if (colMap.description !== undefined) incoming.description = (row[colMap.description] || '').trim();
    if (colMap.itemType !== undefined) {
      const raw = (row[colMap.itemType] || '').trim();
      const typeMap = { 'ספר':'book','חוברת':'booklet','כתב עת':'journal','מאמר':'article','שונות':'misc' };
      incoming.itemType = typeMap[raw] || raw.toLowerCase() || '';
    }

    // מיזוג כל עמודות ז'אנר לשדה אחד
    if (colMap.genreCols.length) {
      const genreVals = colMap.genreCols
        .flatMap(ci => _normalizeMultiVal(row[ci] || ''));
      const unique = [...new Set(genreVals)];
      if (unique.length) incoming.genre = unique.join('; ');
    }

    // בניית רשימת שינויים לכל שדה
    const changes = [];
    for (const fd of FIELDS) {
      const inVal = incoming[fd.key];
      if (!inVal) continue;
      const exVal = (book[fd.key] != null ? String(book[fd.key]) : '').trim();

      // השוואה: אם זהה לחלוטין — מדלגים
      if (exVal.toLowerCase() === inVal.toLowerCase()) continue;

      // ברירת מחדל: אם השדה ריק → החלפה, אחרת → דלג (המשתמש יבחר)
      const defaultAction = exVal ? 'skip' : 'replace';
      changes.push({ field: fd.key, label: fd.label, multi: fd.multi, existing: exVal, incoming: inVal, action: defaultAction });
    }

    // מדפים — מציג שמות, ממיר ל-IDs בעת שמירה
    if (colMap.shelves !== undefined) {
      const inShelfNames = _normalizeMultiVal(row[colMap.shelves] || '');
      if (inShelfNames.length) {
        const exNames = (book.shelves||[]).map(id => (S.shelves.find(s=>s.id===id)||{}).name).filter(Boolean);
        const exStr = exNames.join('; ');
        const inStr = inShelfNames.join('; ');
        if (exStr.toLowerCase() !== inStr.toLowerCase())
          changes.push({ field: 'shelves', label: 'מדפים', multi: true, type: 'shelf', existing: exStr, incoming: inStr, action: exStr ? 'skip' : 'replace' });
      }
    }
    // סדרות
    if (colMap.series !== undefined) {
      const inSeriesNames = _normalizeMultiVal(row[colMap.series] || '');
      if (inSeriesNames.length) {
        const exNames = (book.series||[]).map(id => (S.seriesList.find(s=>s.id===id)||{}).name).filter(Boolean);
        const exStr = exNames.join('; ');
        const inStr = inSeriesNames.join('; ');
        if (exStr.toLowerCase() !== inStr.toLowerCase())
          changes.push({ field: 'series', label: 'סדרות', multi: true, type: 'series', existing: exStr, incoming: inStr, action: exStr ? 'skip' : 'replace' });
      }
    }

    if (changes.length) importData.push({ book, changes });
  }

  _importData = importData;
  if (!importData.length && !notFound.length) return showToast('כל המידע בקובץ זהה לנתונים הקיימים — אין מה לעדכן');
  _showImportModal(notFound);
}

function _showImportModal(notFound) {
  $id('importModal')?.remove();

  const bookRows = _importData.map(({ book, changes }) => {
    const fieldRows = changes.map(ch => {
      const key = `${book.id}__${ch.field}`;
      const existingHtml = ch.existing
        ? `<span>${esc(ch.existing)}</span>`
        : `<em>ריק</em>`;
      const addBtn = ch.multi
        ? `<button class="imp-act-btn add ${ch.action==='add'?'active':''}" onclick="setImportAction('${key}','add',this)">הוסף</button>`
        : '';
      return `<div class="imp-field-row">
        <span class="imp-field-label">${ch.label}</span>
        <span class="imp-field-existing">${existingHtml}</span>
        <span class="imp-field-arrow">→</span>
        <span class="imp-field-incoming">${esc(ch.incoming)}</span>
        <div class="imp-field-actions">
          <button class="imp-act-btn skip ${ch.action==='skip'?'active':''}" onclick="setImportAction('${key}','skip',this)">דלג</button>
          <button class="imp-act-btn replace ${ch.action==='replace'?'active':''}" onclick="setImportAction('${key}','replace',this)">החלף</button>
          ${addBtn}
        </div>
      </div>`;
    }).join('');
    return `<div class="imp-book-card">
      <div class="imp-book-title">📚 ${esc(book.title)}</div>
      ${fieldRows}
    </div>`;
  }).join('');

  const notFoundHtml = notFound.length
    ? `<div class="imp-not-found">⚠️ לא נמצאו בספרייה (${notFound.length}): ${notFound.slice(0,5).map(esc).join(', ')}${notFound.length>5?'...':''}</div>`
    : '';

  const summary = `${_importData.length} ספרים עם שינויים${notFound.length ? ` | ${notFound.length} לא נמצאו` : ''}`;

  document.body.insertAdjacentHTML('beforeend', `
  <div class="imp-modal-overlay" id="importModal">
    <div class="imp-modal-box">
      <div class="imp-modal-head">
        <h2>📤 ייבוא מידע מ-CSV</h2>
        <button class="icon-btn" onclick="closeImportModal()">✕</button>
      </div>
      <div class="imp-modal-hint">
        <strong>דלג</strong> — לא לשנות &nbsp;|&nbsp; <strong>החלף</strong> — מחליף ערך קיים &nbsp;|&nbsp; <strong>הוסף</strong> — מוסיף לערך הקיים עם ;
        <br><span class="imp-summary">${summary}</span>
      </div>
      <div class="imp-modal-body">
        ${notFoundHtml}
        ${bookRows || '<div class="imp-not-found">אין ספרים מתאימים לעדכון</div>'}
      </div>
      <div class="imp-modal-foot">
        <button class="btn-secondary" onclick="closeImportModal()">ביטול</button>
        <button class="btn-primary" onclick="applyImport()">✓ שמור שינויים</button>
      </div>
    </div>
  </div>`);
}

function setImportAction(key, action, btn) {
  const sepIdx = key.indexOf('__');
  const bookId = key.slice(0, sepIdx);
  const field = key.slice(sepIdx + 2);
  const item = _importData.find(it => it.book.id === bookId);
  if (!item) return;
  const ch = item.changes.find(c => c.field === field);
  if (!ch) return;
  ch.action = action;
  btn.closest('.imp-field-actions').querySelectorAll('.imp-act-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function closeImportModal() {
  $id('importModal')?.remove();
  _importData = [];
}

// מוצא מדף לפי שם או יוצר חדש
async function _getOrCreateShelf(name) {
  let s = S.shelves.find(x => x.name.toLowerCase() === name.toLowerCase());
  if (!s) { s = { id: uid(), name }; await dbPut('shelves', s); S.shelves.push(s); }
  return s.id;
}
// מוצא סדרה לפי שם או יוצרת חדשה
async function _getOrCreateSeries(name) {
  let s = S.seriesList.find(x => x.name.toLowerCase() === name.toLowerCase());
  if (!s) { s = { id: uid(), name }; await dbPut('series', s); S.seriesList.push(s); }
  return s.id;
}

async function applyImport() {
  let count = 0;
  for (const { book, changes } of _importData) {
    let changed = false;
    for (const ch of changes) {
      if (ch.action === 'skip') continue;
      if (ch.type === 'shelf' || ch.type === 'series') {
        const names = _normalizeMultiVal(ch.incoming);
        const getOrCreate = ch.type === 'shelf' ? _getOrCreateShelf : _getOrCreateSeries;
        const ids = await Promise.all(names.map(getOrCreate));
        if (ch.action === 'replace') book[ch.field] = ids;
        else if (ch.action === 'add') book[ch.field] = [...new Set([...(book[ch.field]||[]), ...ids])];
        changed = true;
      } else if (ch.action === 'replace') {
        book[ch.field] = ch.incoming;
        changed = true;
      } else if (ch.action === 'add') {
        const exVals = _normalizeMultiVal(book[ch.field] || '');
        const inVals = _normalizeMultiVal(ch.incoming);
        book[ch.field] = [...new Set([...exVals, ...inVals])].join('; ');
        changed = true;
      }
    }
    if (changed) { await dbPut('books', bookMeta(book)); count++; }
  }
  closeImportModal();
  if (count) { renderLib(); showToast(`✓ עודכנו ${count} ספרים`); }
  else showToast('לא בוצעו שינויים');
}

async function exportReadingReportCSV() {
  const BOM = '﻿';
  const allSessions = await dbGetAll('readingSessions');
  const headers = ['שם','מחבר','זמן קריאה (דקות)','פומודורו','ישיבות קריאה','הפרעות','ממוצע לישיבה (דקות)'];
  const bookStats = {};
  for (const s of allSessions) {
    if (!bookStats[s.bookId]) bookStats[s.bookId] = { time:0, pomodoros:0, sessions:0, interruptions:0 };
    bookStats[s.bookId].time += s.duration||0;
    bookStats[s.bookId].pomodoros += s.pomodorosCompleted||0;
    bookStats[s.bookId].sessions++;
    bookStats[s.bookId].interruptions += s.interruptions||0;
  }
  const rows = S.books
    .filter(b => bookStats[b.id])
    .sort((a,b) => (bookStats[b.id]?.time||0) - (bookStats[a.id]?.time||0))
    .map(b => {
      const st = bookStats[b.id];
      const mins = Math.round(st.time/60);
      const avgMins = st.sessions > 0 ? Math.round(st.time/st.sessions/60) : 0;
      return [b.title,b.author,mins,st.pomodoros,st.sessions,st.interruptions,avgMins].map(_csvVal).join(',');
    });
  const today = new Date().toLocaleDateString('he-IL').replace(/\//g,'-');
  _downloadFile(BOM + [headers.map(_csvVal).join(','), ...rows].join('\n'),
    `דוח_קריאה_${today}.csv`, 'text/csv;charset=utf-8');
  showToast('דוח קריאה הורד בהצלחה ✓');
}
