// טוען מסמך PDF ומאתחל את תצוגת הקריאה הרציפה
async function initPdf(data) {
  const loadingEl = $id('loadingMsg');
  try {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const ab = data instanceof ArrayBuffer ? data : await data.arrayBuffer();
    S.pdfDoc = await pdfjsLib.getDocument({
      data: ab.slice(0),
      cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/',
      cMapPacked: true,
      standardFontDataUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/standard_fonts/',
      disableFontFace: true,
    }).promise;
    S.currentBook.totalPages = S.pdfDoc.numPages;
    await dbPut('books', bookMeta(S.currentBook));
    const idx = S.books.findIndex(b=>b.id===S.currentBook.id);
    if (idx>=0) S.books[idx].totalPages = S.pdfDoc.numPages;

    S.pdfOutline = [];
    try { S.pdfOutline = await S.pdfDoc.getOutline() || []; } catch(e) {}

    $id('pdfContainer').style.display = 'block';
    if (loadingEl) loadingEl.style.display = 'none';
    $id('readerNav').style.display = 'flex';
    await setupPdfContinuous();
  } catch(e) {
    if (loadingEl) loadingEl.textContent = 'שגיאה בטעינת PDF: ' + e.message;
    console.error(e);
  }
}

// Scroll to a PDF page (used by nav buttons, keyboard, bookmarks)
async function renderPdfPage(num) {
  if (!S.pdfDoc) return;
  num = Math.max(1, Math.min(num, S.pdfDoc.numPages));
  const wrap = $id('readerMain')?.querySelector(`.pdf-page-wrap[data-page="${num}"]`);
  if (!wrap) return;
  if (!wrap.dataset.rendered) await renderPageIntoWrapper(num, wrap);
  wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Renders a single page canvas+textLayer into its wrapper div
async function renderPageIntoWrapper(pageNum, wrapper) {
  if (wrapper.dataset.rendered) return;
  wrapper.dataset.rendered = '1';
  const dpr = window.devicePixelRatio || 1;
  const rm = $id('readerMain');
  const containerW = (rm ? rm.clientWidth : 600) - 32;
  const page = await S.pdfDoc.getPage(pageNum);
  const baseVP = page.getViewport({ scale: 1 });
  const scale = (containerW / baseVP.width) * dpr;
  const viewport = page.getViewport({ scale });
  const w = Math.round(viewport.width / dpr);
  const h = Math.round(viewport.height / dpr);

  const canvas = document.createElement('canvas');
  canvas.width = Math.round(viewport.width);
  canvas.height = Math.round(viewport.height);
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

  const textLayer = document.createElement('div');
  textLayer.className = 'pdf-text-layer';
  textLayer.style.width = w + 'px';
  textLayer.style.height = h + 'px';
  try {
    const textContent = await page.getTextContent();
    await pdfjsLib.renderTextLayer({ textContentSource: textContent, container: textLayer, viewport, textDivs: [] }).promise;
  } catch(e) {}

  wrapper.style.width = w + 'px';
  wrapper.style.height = h + 'px';
  const placeholder = wrapper.querySelector('.pdf-page-placeholder');
  if (placeholder) placeholder.remove();
  wrapper.appendChild(canvas);
  wrapper.appendChild(textLayer);
}

// מגדיר תצוגת PDF רציפה עם טעינה עצלה ושמירת מיקום גלילה
async function setupPdfContinuous() {
  if (S._pdfObserver) { S._pdfObserver.disconnect(); S._pdfObserver = null; }
  const numPages = S.pdfDoc.numPages;
  const dpr = window.devicePixelRatio || 1;
  const rm = $id('readerMain');
  const containerW = (rm ? rm.clientWidth : 600) - 32;

  // Use page 1 dimensions as template for all placeholder heights
  const p1 = await S.pdfDoc.getPage(1);
  const baseVP = p1.getViewport({ scale: 1 });
  const scale = containerW / baseVP.width;
  const pageH = Math.round(baseVP.height * scale);
  const pageW = Math.round(baseVP.width * scale);

  const container = $id('pdfPagesContainer');
  container.innerHTML = '';

  for (let i = 1; i <= numPages; i++) {
    const wrap = document.createElement('div');
    wrap.className = 'pdf-page-wrap';
    wrap.dataset.page = i;
    wrap.style.width = pageW + 'px';
    wrap.style.height = pageH + 'px';
    const ph = document.createElement('div');
    ph.className = 'pdf-page-placeholder';
    ph.textContent = i + ' / ' + numPages;
    wrap.appendChild(ph);
    container.appendChild(wrap);
  }

  // Lazy render via IntersectionObserver
  S._pdfObserver = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) renderPageIntoWrapper(+entry.target.dataset.page, entry.target);
    });
  }, { root: rm, rootMargin: '300px' });
  container.querySelectorAll('.pdf-page-wrap').forEach(w => S._pdfObserver.observe(w));

  // Track current page + progress from scroll
  if (rm) {
    rm.addEventListener('scroll', onPdfScroll, { passive: true });
  }

  // Restore saved position
  const savedFrac = S.currentBook?.pdfScrollFrac || 0;
  const savedPage = S.currentPage || 1;
  if (savedFrac > 0) {
    // Pre-render the page that should be visible at the saved position
    const targetWrap = container.querySelector(`[data-page="${savedPage}"]`);
    if (targetWrap) await renderPageIntoWrapper(savedPage, targetWrap);
    // scrollHeight is computed synchronously after DOM access — restore exact position
    if (rm && rm.scrollHeight > rm.clientHeight) {
      rm.scrollTop = Math.round(savedFrac * (rm.scrollHeight - rm.clientHeight));
    }
  } else if (savedPage > 1) {
    const targetWrap = container.querySelector(`[data-page="${savedPage}"]`);
    if (targetWrap) {
      await renderPageIntoWrapper(savedPage, targetWrap);
      targetWrap.scrollIntoView({ block: 'start' });
    }
  }
  updatePageDisplay();
  setupTextSelect($id('pdfContainer'));
}

// מעדכן את מספר העמוד והתקדמות הקריאה בעת גלילה ב-PDF
function onPdfScroll() {
  if (!S.pdfDoc) return;
  const rm = $id('readerMain');
  if (!rm) return;

  // Detect which page is most visible (its top is closest to viewport top)
  const rmTop = rm.getBoundingClientRect().top;
  const wraps = rm.querySelectorAll('.pdf-page-wrap');
  let best = null, bestDist = Infinity;
  for (const w of wraps) {
    const dist = Math.abs(w.getBoundingClientRect().top - rmTop);
    if (dist < bestDist) { bestDist = dist; best = w; }
  }
  const pageNum = best ? +best.dataset.page : S.currentPage;

  if (pageNum !== S.currentPage) {
    S.currentPage = pageNum;
    const pd = $id('pageDisplay');
    if (pd) pd.textContent = `${pageNum} / ${S.pdfDoc.numPages}`;
    const prev = $id('prevBtn'), next = $id('nextBtn');
    if (prev) prev.disabled = pageNum <= 1;
    if (next) next.disabled = pageNum >= S.pdfDoc.numPages;
  }

  // Scroll-based progress + save exact position
  const scrollFrac = rm.scrollHeight > rm.clientHeight ? rm.scrollTop / (rm.scrollHeight - rm.clientHeight) : 0;
  const pi = $id('pageIndicator');
  if (pi) pi.textContent = Math.round(scrollFrac * 100) + '%';

  if (S.currentBook) {
    S.currentBook.currentPage = pageNum;
    S.currentBook.pdfScrollFrac = scrollFrac;
    clearTimeout(S._pdfSaveTimer);
    S._pdfSaveTimer = setTimeout(() => dbPut('books', bookMeta(S.currentBook)), 1000);
  }
}

// ═══ EPUB READER ═══
// טוען קובץ EPUB, מפרש את מבנהו ומציג את התוכן
async function initEpub(data) {
  const loadingEl = $id('loadingMsg');
  try {
    const ab = data instanceof ArrayBuffer ? data : await data.arrayBuffer();
    const zip = await JSZip.loadAsync(ab);

    // Extract cover if missing
    if (!S.currentBook.coverUrl) {
      try {
        const cover = await extractEpubCoverFromZip(zip);
        if (cover) {
          S.currentBook.coverUrl = cover;
          const idx = S.books.findIndex(b => b.id === S.currentBook.id);
          if (idx >= 0) S.books[idx].coverUrl = cover;
          await dbPut('books', bookMeta(S.currentBook));
        }
      } catch(e) {}
    }

    const containerXml = await zip.file('META-INF/container.xml')?.async('string');
    if (!containerXml) throw new Error('container.xml חסר');
    const opfMatch = containerXml.match(/full-path="([^"]+)"/);
    if (!opfMatch) throw new Error('OPF path לא נמצא');
    const opfPath = opfMatch[1];
    const opfDir = opfPath.includes('/') ? opfPath.slice(0, opfPath.lastIndexOf('/')+1) : '';
    const opfXml = await zip.file(opfPath)?.async('string');
    if (!opfXml) throw new Error('OPF חסר');

    const parser = new DOMParser();
    const opfDoc = parser.parseFromString(opfXml, 'application/xml');
    const manifest = {};
    opfDoc.querySelectorAll('manifest item').forEach(item => {
      manifest[item.getAttribute('id')] = {
        href: item.getAttribute('href'),
        type: item.getAttribute('media-type'),
      };
    });

    S.epubChapters = [];
    opfDoc.querySelectorAll('spine itemref').forEach(ref => {
      const id = ref.getAttribute('idref');
      if (manifest[id]) S.epubChapters.push({ href: opfDir + manifest[id].href, id });
    });
    if (!S.epubChapters.length) throw new Error('Spine ריק');

    // Extract chapter labels from NCX or nav.xhtml
    try {
      const labelsMap = {};
      const ncxId = opfDoc.querySelector('spine')?.getAttribute('toc');
      if (ncxId && manifest[ncxId]?.href) {
        const ncx = await zip.file(opfDir + manifest[ncxId].href)?.async('string');
        if (ncx) {
          new DOMParser().parseFromString(ncx, 'application/xml')
            .querySelectorAll('navPoint').forEach(np => {
              const src = np.querySelector('content')?.getAttribute('src')?.split('#')[0];
              const label = np.querySelector('navLabel text')?.textContent?.trim();
              if (src && label) { labelsMap[opfDir + src] = label; labelsMap[src] = label; }
            });
        }
      }
      const navHref = Array.from(opfDoc.querySelectorAll('manifest item'))
        .find(i => i.getAttribute('properties')?.includes('nav'))?.getAttribute('href');
      if (navHref) {
        const navContent = await zip.file(opfDir + navHref)?.async('string');
        if (navContent) {
          new DOMParser().parseFromString(navContent, 'text/html')
            .querySelectorAll('nav a').forEach(a => {
              const src = a.getAttribute('href')?.split('#')[0];
              const label = a.textContent.trim();
              if (src && label) { labelsMap[opfDir + src] = label; labelsMap[src] = label; }
            });
        }
      }
      if (Object.keys(labelsMap).length) {
        S.epubChapters = S.epubChapters.map(ch => ({
          ...ch, label: labelsMap[ch.href] || labelsMap[ch.href.replace(opfDir, '')] || null
        }));
      }
    } catch(e) {}

    S.epubImages = {};
    for (const [fpath, file] of Object.entries(zip.files)) {
      if (/\.(png|jpg|jpeg|gif|svg|webp)$/i.test(fpath)) {
        try {
          const blob = await file.async('blob');
          S.epubImages[fpath] = URL.createObjectURL(blob);
        } catch(e) {}
      }
    }
    S.epubZip = zip;
    S.epubDir = opfDir;
    S.currentBook.totalPages = S.epubChapters.length;
    await dbPut('books', bookMeta(S.currentBook));

    const epubEl = $id('epubContent');
    epubEl.style.display = 'block';
    epubEl.style.fontSize = S.fontSize + 'px';
    if (loadingEl) loadingEl.style.display = 'none';

    // Hide chapter nav - use continuous scroll instead
    const nav = $id('readerNav');
    if (nav) nav.style.display = 'none';

    await loadAllEpubContent();

    // Restore scroll position — double rAF ensures layout is complete before scrolling
    const savedPct = S.currentBook.epubScrollPct || 0;
    if (savedPct > 0) {
      requestAnimationFrame(() => requestAnimationFrame(() => {
        const el = $id('readerMain');
        if (el && el.scrollHeight > el.clientHeight) {
          el.scrollTop = Math.round((el.scrollHeight - el.clientHeight) * savedPct / 100);
        }
      }));
    }

    setupEpubScroll();
    setupTextSelect($id('epubContent'));
  } catch(e) {
    if (loadingEl) loadingEl.textContent = 'שגיאה בטעינת EPUB: ' + e.message;
    console.error(e);
  }
}

// גולל לפרק EPUB לפי אינדקס בתצוגה הרציפה
function renderEpubChapter(idx) {
  if (!S.epubChapters.length) return;
  idx = Math.max(0, Math.min(idx, S.epubChapters.length - 1));
  S.epubChapterIdx = idx;
  // In continuous scroll mode, scroll to the chapter div
  const chDiv = document.querySelector(`#epubContent [data-idx="${idx}"]`);
  if (chDiv) chDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// פותר נתיב יחסי של קובץ EPUB לנתיב מלא
function resolveEpubPath(base, relative) {
  if (!relative || relative.startsWith('http')) return relative;
  if (relative.startsWith('/')) return relative.slice(1);
  const parts = base.split('/'); parts.pop();
  for (const p of relative.split('/')) {
    if (p==='..') parts.pop();
    else if (p!=='.') parts.push(p);
  }
  return parts.join('/');
}

async function nextPage() {
  if (S.pdfDoc) {
    if (S.currentPage < S.pdfDoc.numPages) await renderPdfPage(S.currentPage + 1);
  } else {
    renderEpubChapter(S.epubChapterIdx + 1);
  }
}
// חוזר לעמוד או לפרק הקודם בקורא
async function prevPage() {
  if (S.pdfDoc) {
    if (S.currentPage > 1) await renderPdfPage(S.currentPage - 1);
  } else {
    renderEpubChapter(S.epubChapterIdx - 1);
  }
}

// מעדכן את תצוגת מספר העמוד ומצב כפתורי הניווט
function updatePageDisplay() {
  if (S.pdfDoc) {
    const total = S.pdfDoc.numPages;
    const pd = $id('pageDisplay');
    if (pd) pd.textContent = `${S.currentPage} / ${total}`;
    const prev = $id('prevBtn'), next = $id('nextBtn');
    if (prev) prev.disabled = S.currentPage <= 1;
    if (next) next.disabled = S.currentPage >= total;
    // progress updated live by onPdfScroll
  }
  // EPUB progress updated live by updateEpubScrollProgress
}

// מרנדר את קטע תוכן העניינים הידני והאוטומטי
function renderTocSection() {
  const toc = S.currentBook?.toc || [];
  const hasAuto = (S.pdfDoc && S.pdfOutline?.length) || (!S.pdfDoc && S.epubChapters.length);
  const importLabel = toc.length ? '📥 ייבא מחדש' : '📥 ייבא אוטומטי';

  const rows = toc.map(item => {
    if (S._editingTocId === item.id) {
      return `<div class="toc-edit-row">
        <input class="toc-edit-title" id="tocEditTitle" value="${esc(item.title)}" placeholder="שם הפרק" onkeydown="if(event.key==='Enter')saveTocEdit('${item.id}');if(event.key==='Escape')cancelTocEdit()">
        <input class="toc-edit-page" id="tocEditPage" type="number" min="1" value="${item.page}" onkeydown="if(event.key==='Enter')saveTocEdit('${item.id}');if(event.key==='Escape')cancelTocEdit()">
        <button class="icon-btn" onclick="saveTocEdit('${item.id}')">✓</button>
        <button class="icon-btn" onclick="cancelTocEdit()">✕</button>
      </div>`;
    }
    return `<div class="toc-item" onclick="jumpToTocItem('${item.id}')">
      <span class="toc-title">${esc(item.title)}</span>
      <span class="toc-page-lbl">עמ׳ ${item.page}</span>
      <button class="icon-btn toc-btn" onclick="event.stopPropagation();startEditToc('${item.id}')">✏️</button>
      <button class="icon-btn toc-btn" onclick="event.stopPropagation();deleteTocItem('${item.id}')">🗑️</button>
    </div>`;
  }).join('');

  const addRow = S._addingToc ? `<div class="toc-edit-row">
    <input class="toc-edit-title" id="tocNewTitle" placeholder="שם הפרק" onkeydown="if(event.key==='Enter')saveNewTocItem();if(event.key==='Escape')cancelTocAdd()">
    <input class="toc-edit-page" id="tocNewPage" type="number" min="1" value="${S.pdfDoc ? S.currentPage : S.epubChapterIdx + 1}" onkeydown="if(event.key==='Enter')saveNewTocItem();if(event.key==='Escape')cancelTocAdd()">
    <button class="icon-btn" onclick="saveNewTocItem()">✓</button>
    <button class="icon-btn" onclick="cancelTocAdd()">✕</button>
  </div>` : '';

  return `<div class="bm-section-title">📋 תוכן עניינים</div>
    <div style="display:flex;gap:6px;margin-bottom:6px">
      <button class="btn-primary" style="flex:1;font-size:0.8rem" onclick="beginAddToc()">+ פרק</button>
      ${hasAuto ? `<button class="btn-secondary" style="font-size:0.8rem" onclick="importAutoToc()">${importLabel}</button>` : ''}
    </div>
    ${addRow}
    <div class="toc-list">${rows || '<p class="muted" style="text-align:center;padding:8px;font-size:0.8rem">אין תוכן עניינים</p>'}</div>`;

// קופץ לעמוד או לפרק המשויך לפריט תוכן העניינים
function jumpToTocItem(id) {
  const item = (S.currentBook?.toc || []).find(t => t.id === id);
  if (!item) return;
  if (S.pdfDoc) renderPdfPage(item.page);
  else renderEpubChapter(item.page - 1);

// מפעיל מצב הוספת פרק חדש לתוכן העניינים
function beginAddToc() { S._addingToc = true; S._editingTocId = null; switchPanel('bookmarks'); setTimeout(() => $id('tocNewTitle')?.focus(), 30); }
// מבטל את הוספת פרק חדש לתוכן העניינים
function cancelTocAdd() { S._addingToc = false; switchPanel('bookmarks'); }
// מפעיל מצב עריכת פרק קיים בתוכן העניינים
function startEditToc(id) { S._editingTocId = id; S._addingToc = false; switchPanel('bookmarks'); setTimeout(() => $id('tocEditTitle')?.focus(), 30); }
// מבטל את עריכת פרק תוכן העניינים
function cancelTocEdit() { S._editingTocId = null; switchPanel('bookmarks'); }

// שומר את השינויים בפרק תוכן העניינים שנערך
async function saveTocEdit(id) {
  const title = $id('tocEditTitle')?.value.trim();
  const page = Math.max(1, parseInt($id('tocEditPage')?.value) || 1);
  if (!title) return;
  const item = (S.currentBook.toc || []).find(t => t.id === id);
  if (item) { item.title = title; item.page = page; }
  S.currentBook.toc.sort((a, b) => a.page - b.page);
  await dbPut('books', bookMeta(S.currentBook));
  S._editingTocId = null;
  switchPanel('bookmarks');
}

// שומר פרק חדש שנוסף לתוכן העניינים
async function saveNewTocItem() {
  const title = $id('tocNewTitle')?.value.trim();
  const page = Math.max(1, parseInt($id('tocNewPage')?.value) || 1);
  if (!title) return;
  if (!S.currentBook.toc) S.currentBook.toc = [];
  S.currentBook.toc.push({ id: uid(), title, page });
  S.currentBook.toc.sort((a, b) => a.page - b.page);
  await dbPut('books', bookMeta(S.currentBook));
  S._addingToc = false;
  switchPanel('bookmarks');
}

// מוחק פרק מתוכן העניינים לאחר אישור
async function deleteTocItem(id) {
  if (!confirm('למחוק פרק זה?')) return;
  S.currentBook.toc = (S.currentBook.toc || []).filter(t => t.id !== id);
  await dbPut('books', bookMeta(S.currentBook));
  switchPanel('bookmarks');
}

// מייבא תוכן עניינים אוטומטי מה-PDF outline או מפרקי ה-EPUB
async function importAutoToc() {
  const items = [];
  if (S.pdfDoc && S.pdfOutline?.length) {
    const flatten = async (nodes, depth) => {
      for (const node of nodes) {
        let page = 1;
        try {
          let dest = node.dest;
          if (typeof dest === 'string') dest = await S.pdfDoc.getDestination(dest);
          if (Array.isArray(dest)) page = await S.pdfDoc.getPageIndex(dest[0]) + 1;
        } catch(e) {}
        items.push({ id: uid(), title: ' '.repeat(depth * 2) + (node.title || ''), page });
        if (node.items?.length) await flatten(node.items, depth + 1);
      }
    };
    await flatten(S.pdfOutline, 0);
  } else if (!S.pdfDoc && S.epubChapters.length) {
    S.epubChapters.forEach((ch, i) => items.push({
      id: uid(), title: ch.label || `פרק ${i + 1}`, page: i + 1,
    }));
  }
  if (!items.length) return;
  S.currentBook.toc = items;
  await dbPut('books', bookMeta(S.currentBook));
  switchPanel('bookmarks');
}

// מוסיף סימנייה במיקום הנוכחי בקריאה
async function addBookmark() {
  const label = prompt('תווית לסימנייה (אפשר להשאיר ריק):', '') ?? null;
  if (label === null) return;
  const bm = {
    id: uid(), bookId: S.currentBook.id,
    page: S.pdfDoc ? S.currentPage : S.epubChapterIdx + 1,
    epubChapterIdx: S.pdfDoc ? null : S.epubChapterIdx,
    scrollPct: S.pdfDoc ? null : getEpubScrollPct(),
    label: label.trim(),
    created: Date.now(),
  };
  await dbPut('bookmarks', bm);
  S.bookmarks.push(bm);
  if (S.readerPanel === 'bookmarks') switchPanel('bookmarks');
}

// מוחק סימנייה לאחר אישור המשתמש
async function deleteBookmark(id) {
  if (!confirm('למחוק סימנייה זו?')) return;
  await dbDelete('bookmarks', id);
  S.bookmarks = S.bookmarks.filter(b => b.id !== id);
  if (S.readerPanel === 'bookmarks') switchPanel('bookmarks');
}

// קופץ למיקום השמור של סימנייה בקורא
function jumpToBookmark(id) {
  const bm = S.bookmarks.find(b => b.id === id);
  if (!bm) return;
  if (S.pdfDoc) {
    renderPdfPage(bm.page);
  } else {
    const chIdx = bm.epubChapterIdx != null ? bm.epubChapterIdx : bm.page - 1;
    renderEpubChapter(chIdx);
    if (bm.scrollPct != null) {
      setTimeout(() => {
        const el = $id('readerMain');
        if (el) el.scrollTop = Math.round(bm.scrollPct / 100 * (el.scrollHeight - el.clientHeight));
      }, 500);
    }
  }
}

// ═══ TEXT SELECTION ═══
let _selFab = null;
let _selFabSetupDone = false;

// מגדיר מאזיני אירועים לזיהוי בחירת טקסט בקורא
function setupTextSelect(el) {
  if (!el) return;
  // mouseup covers desktop; selectionchange covers touch / mobile
  el.addEventListener('mouseup', _onSelectionEnd);
  el.addEventListener('touchend', _onSelectionEnd);
  // selectionchange fires on mobile after native selection handles are moved
  if (!_selFabSetupDone) {
    let _scTimer = null;
    document.addEventListener('selectionchange', () => {
      clearTimeout(_scTimer);
      _scTimer = setTimeout(_onSelectionEnd, 400);
    });
    _selFabSetupDone = true;
  }
}

// מטפל בסיום בחירת טקסט ומציג כפתור פעולה מהירה
function _onSelectionEnd() {
  const text = window.getSelection()?.toString().trim();
  if (text && text.length > 1) {
    S.pendingSelText = text;
    showSelFab();
  } else if (!text) {
    // selection cleared — hide FAB
    if (_selFab) { _selFab.remove(); _selFab = null; }
  }
}

// מציג כפתור פעולה מרחף מעל הטקסט הנבחר עם אפשרויות הוספה
function showSelFab() {
  if (_selFab) { _selFab.remove(); _selFab = null; }
  const fab = document.createElement('div');
  fab.className = 'sel-fab';
  fab.innerHTML = `
    <button onmousedown="event.preventDefault();switchPanel('notes');showNoteModal(true);if(_selFab){_selFab.remove();_selFab=null}">📝 הערה</button>
    <button onmousedown="event.preventDefault();switchPanel('dict');showDictModal(true);if(_selFab){_selFab.remove();_selFab=null}">📒 מילון</button>
    <button onmousedown="event.preventDefault();if(_selFab){_selFab.remove();_selFab=null}">✕</button>`;
  document.body.appendChild(fab);
  _selFab = fab;
  const sel = window.getSelection();
  if (sel?.rangeCount) {
    const rect = sel.getRangeAt(0).getBoundingClientRect();
    // FAB is position:fixed — coordinates are viewport-relative, no scroll offset needed
    const fabH = 48, fabW = 220;
    let top = rect.top - fabH - 8;
    if (top < 4) top = rect.bottom + 8; // flip below if no room above
    let left = rect.left + rect.width / 2 - fabW / 2;
    left = Math.max(4, Math.min(left, window.innerWidth - fabW - 4));
    fab.style.top = top + 'px';
    fab.style.left = left + 'px';
  }
  setTimeout(() => { if (_selFab === fab) { fab.remove(); _selFab = null; } }, 8000);
}

// ═══ PDF COVER ═══
// מחלץ את עמוד 1 של PDF כתמונת כריכה בפורמט JPEG
async function extractPdfCover(data) {
  try {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const doc = await pdfjsLib.getDocument({ data, useSystemFonts: true, standardFontDataUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/standard_fonts/' }).promise;
    const page = await doc.getPage(1);
    const viewport = page.getViewport({ scale: 0.4 });
    const canvas = document.createElement('canvas');
    canvas.width = Math.round(viewport.width);
    canvas.height = Math.round(viewport.height);
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    doc.destroy();
    return canvas.toDataURL('image/jpeg', 0.7);
  } catch(e) { return null; }
}


// מזהה שפה מתוך טקסט לפי טווחי Unicode
function _detectLangFromText(text) {
  if (!text || text.length < 30) return '';
  let he = 0, ar = 0, lat = 0;
  for (const c of text) {
    const cp = c.codePointAt(0);
    if ((cp >= 0x0590 && cp <= 0x05FF) || (cp >= 0xFB1D && cp <= 0xFB4F)) he++;
    else if (cp >= 0x0600 && cp <= 0x06FF) ar++;
    else if ((cp >= 0x41 && cp <= 0x5A) || (cp >= 0x61 && cp <= 0x7A)) lat++;
  }
  const total = he + ar + lat;
  if (total < 20) return '';
  if (he / total > 0.15) return 'עברית';
  if (ar / total > 0.20) return 'ערבית';
  if (lat / total > 0.40) return 'English';
  return '';
}

// מזהה שפה אוטומטית מקובץ הספר הנוכחי (לכפתור בחלון עריכה)
async function autoDetectLanguage(bookId) {
  const book = S.books.find(b => b.id === bookId);
  if (!book) return;
  showToast('מזהה שפה...');
  try {
    const fileRecord = await dbGet('files', bookId);
    if (!fileRecord?.data) return showToast('קובץ לא נמצא');
    let lang = '';
    if (book.format === 'epub') {
      const zip = await JSZip.loadAsync(fileRecord.data.slice(0));
      const meta = await extractEpubMeta(zip);
      lang = meta.language || '';
    } else if (book.format === 'pdf') {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const doc = await pdfjsLib.getDocument({ data: fileRecord.data.slice(0) }).promise;
      try {
        const { info } = await doc.getMetadata();
        if (info?.Language) { lang = _normalizeLang(info.Language); }
        if (!lang) {
          const page = await doc.getPage(1);
          const content = await page.getTextContent();
          lang = _detectLangFromText(content.items.map(i => i.str).join(''));
        }
      } finally { doc.destroy(); }
    }
    if (lang) { $id('eLanguage').value = lang; showToast(`זוהתה שפה: ${lang} ✓`); }
    else showToast('לא זוהתה שפה אוטומטית');
  } catch(e) { showToast('שגיאה בזיהוי שפה'); }
}

async function autoDetectAllLanguages() {
  const todo = S.books.filter(b => !b.language);
  if (!todo.length) return showToast('לכל הפריטים כבר יש שפה מוגדרת');
  showToast(`מזהה שפות ל-${todo.length} פריטים...`);
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  let updated = 0, skipped = 0;
  for (let i = 0; i < todo.length; i++) {
    const book = todo[i];
    try {
      const fileRecord = await dbGet('files', book.id);
      if (!fileRecord?.data) { skipped++; continue; }
      let lang = '';
      if (book.format === 'epub') {
        const zip = await JSZip.loadAsync(fileRecord.data.slice(0));
        const meta = await extractEpubMeta(zip);
        lang = meta.language || '';
        if (!lang) {
          const textFile = Object.keys(zip.files).find(n => n.endsWith('.html') || n.endsWith('.xhtml') || n.endsWith('.htm'));
          if (textFile) {
            const txt = await zip.files[textFile].async('string');
            lang = _detectLangFromText(txt.replace(/<[^>]+>/g, ' '));
          }
        }
      } else if (book.format === 'pdf') {
        const doc = await pdfjsLib.getDocument({ data: fileRecord.data.slice(0) }).promise;
        try {
          const { info } = await doc.getMetadata();
          if (info?.Language) lang = _normalizeLang(info.Language);
          if (!lang) {
            const page = await doc.getPage(1);
            const content = await page.getTextContent();
            lang = _detectLangFromText(content.items.map(i => i.str).join(''));
          }
        } finally { doc.destroy(); }
      }
      if (lang) { book.language = lang; await dbPut('books', book); updated++; }
      else skipped++;
    } catch(e) { skipped++; }
    if ((i + 1) % 5 === 0 || i === todo.length - 1)
      showToast(`מעבד ${i+1}/${todo.length}...`);
  }
  renderLib();
  showToast(updated ? `זוהתה שפה ל-${updated} פריטים ✓${skipped ? ` · ${skipped} ללא זיהוי` : ''}` : 'לא זוהתה שפה לאף פריט');
}

// ממיר קוד שפה (ISO) לשם קריא
function _normalizeLang(code) {
  if (!code) return '';
  const map = { he:'עברית', iw:'עברית', en:'English', en_us:'English', en_gb:'English',
    fr:'Français', de:'Deutsch', es:'Español', ar:'العربية', ru:'Русский',
    yi:'יידיש', la:'Latin', it:'Italiano', pt:'Português', nl:'Nederlands', pl:'Polski' };
  return map[code.toLowerCase().replace('-','_')] || code;
}

// ═══ EPUB META ═══
// חולץ מטאדאטה של EPUB כגון כותרת, מחבר ושנה מקובץ ה-OPF
async function extractEpubMeta(zip) {
  try {
    const containerXml = await zip.file('META-INF/container.xml')?.async('string');
    if (!containerXml) return {};
    const opfPath = containerXml.match(/full-path="([^"]+)"/)?.[1];
    if (!opfPath) return {};
    const opfXml = await zip.file(opfPath)?.async('string');
    if (!opfXml) return {};
    const doc = new DOMParser().parseFromString(opfXml, 'application/xml');
    const dc = tag => {
      const ns = 'http://purl.org/dc/elements/1.1/';
      return (doc.getElementsByTagNameNS(ns, tag)[0]
        || doc.querySelector(`dc\\:${tag}`)
        || doc.querySelector(tag))?.textContent?.trim() || '';
    };
    const year = dc('date').match(/(\d{4})/)?.[1] || '';
    const rawLang = dc('language');
    const language = _normalizeLang(rawLang);
    return { title: dc('title'), subtitle: dc('subtitle'), author: dc('creator'), publisher: dc('publisher'), year, genre: dc('subject'), language, description: dc('description') };
  } catch(e) { return {}; }
}

// ═══ EPUB COVER EXTRACTION ═══
// מחלץ תמונת כריכה מקובץ EPUB ZIP בשיטות שונות
async function extractEpubCoverFromZip(zip) {
  function toDataUrl(blob) {
    return new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(blob); });
  }
  try {
    const containerXml = await zip.file('META-INF/container.xml').async('string');
    const opfMatch = containerXml.match(/full-path="([^"]+)"/);
    if (!opfMatch) return null;
    const opfPath = opfMatch[1];
    const opfDir = opfPath.includes('/') ? opfPath.slice(0, opfPath.lastIndexOf('/')+1) : '';
    const opfXml = await zip.file(opfPath).async('string');
    const doc = new DOMParser().parseFromString(opfXml, 'application/xml');
    const items = doc.querySelectorAll('manifest item');

    // Method 1: properties="cover-image"
    for (const item of items) {
      if (item.getAttribute('properties') === 'cover-image') {
        const href = item.getAttribute('href');
        const file = zip.file(opfDir + href) || zip.file(href);
        if (file) return toDataUrl(await file.async('blob'));
      }
    }

    // Method 2: <meta name="cover" content="id">
    const meta = doc.querySelector('meta[name="cover"]');
    if (meta) {
      const id = meta.getAttribute('content');
      const item = doc.querySelector('manifest item[id="' + id + '"]');
      if (item) {
        const href = item.getAttribute('href');
        const file = zip.file(opfDir + href) || zip.file(href);
        if (file) return toDataUrl(await file.async('blob'));
      }
    }

    // Method 3: First <img> in first 2 chapters
    const manifest = {};
    items.forEach(i => manifest[i.getAttribute('id')] = i.getAttribute('href'));
    const spine = Array.from(doc.querySelectorAll('spine itemref')).slice(0, 2);
    for (const ref of spine) {
      const href = opfDir + (manifest[ref.getAttribute('idref')] || '');
      const chFile = zip.file(href);
      if (!chFile) continue;
      const html = await chFile.async('string');
      const imgMatch = html.match(/<img[^>]+src=["']([^"']+)["']/i);
      if (!imgMatch) continue;
      const imgPath = resolveEpubPath(href, imgMatch[1]);
      const imgFile = zip.file(imgPath);
      if (imgFile) return toDataUrl(await imgFile.async('blob'));
    }
  } catch(e) {}
  return null;
}

// ═══ EPUB CONTINUOUS SCROLL ═══
// טוען את כל פרקי ה-EPUB ומרנדר אותם לתצוגה רציפה
async function loadAllEpubContent() {
  const el = document.getElementById('epubContent');
  if (!el) return;
  el.innerHTML = '<div style="text-align:center;padding:30px;color:var(--muted)">⏳ טוען פרקים...</div>';

  const parts = [];
  for (let i = 0; i < S.epubChapters.length; i++) {
    const chapter = S.epubChapters[i];
    const candidates = [chapter.href, chapter.href.replace(S.epubDir,'')];
    let chapterFile = null;
    for (const c of candidates) { chapterFile = S.epubZip.file(c); if (chapterFile) break; }
    if (!chapterFile) continue;
    const html = await chapterFile.async('string');
    const doc = new DOMParser().parseFromString(html, 'text/html');
    doc.querySelectorAll('script, link[rel="stylesheet"], link[rel="style"]').forEach(el => el.remove());
    // Strip fixed px widths that cause horizontal overflow on mobile
    doc.querySelectorAll('[width]').forEach(el => el.removeAttribute('width'));
    doc.querySelectorAll('[height]').forEach(el => el.removeAttribute('height'));
    doc.querySelectorAll('[style]').forEach(el => {
      el.style.width = '';
      el.style.minWidth = '';
      el.style.maxWidth = '';
      el.style.float = '';
    });
    doc.querySelectorAll('img').forEach(img => {
      const src = img.getAttribute('src') || '';
      const resolved = resolveEpubPath(chapter.href, src);
      const blobUrl = S.epubImages[resolved] || S.epubImages[src];
      if (blobUrl) { img.src = blobUrl; img.onerror = null; }
      else img.style.display = 'none';
    });
    const body = doc.querySelector('body');
    const content = body ? body.innerHTML.trim() : '';
    if (content) parts.push('<div class="epub-chapter" data-idx="' + i + '">' + content + '</div>');
  }
  el.innerHTML = parts.join('<div class="epub-chapter-sep"></div>');
  updateEpubScrollProgress();
}

// מגדיר מאזין גלילה ל-EPUB ושומר את ההתקדמות אוטומטית
function setupEpubScroll() {
  const el = document.getElementById('readerMain');
  if (!el) return;
  let t = null;
  el.addEventListener('scroll', () => {
    if (S.pdfDoc) return;
    updateEpubScrollProgress();
    clearTimeout(t);
    t = setTimeout(async () => {
      if (!S.currentBook || S.pdfDoc) return;
      S.currentBook.epubScrollPct = getEpubScrollPct();
      S.currentBook.currentPage = Math.max(1, Math.round(S.currentBook.epubScrollPct / 100 * S.epubChapters.length));
      await dbPut('books', bookMeta(S.currentBook));
    }, 800);
  });
}

// מחזיר את אחוז הגלילה הנוכחי בתוכן ה-EPUB
function getEpubScrollPct() {
  const el = document.getElementById('readerMain');
  if (!el) return 0;
  const total = el.scrollHeight - el.clientHeight;
  return total > 0 ? Math.round((el.scrollTop / total) * 100) : 0;
}

// מעדכן את תצוגת ההתקדמות בראש הדף בעת גלילה ב-EPUB
function updateEpubScrollProgress() {
  if (S.pdfDoc) return;
  const pct = getEpubScrollPct();
  const pi = $id('pageIndicator');
  if (pi) pi.textContent = pct + '%';
  const pd = $id('pageDisplay');
  if (pd) pd.textContent = pct + '% קרוא';
}
